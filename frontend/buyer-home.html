<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="nav-placeholder"></div>

<!-- Hero search -->
<div class="hero-search">
  <h1>Find Your Perfect Car</h1>
  <p>Browse thousands of verified used cars across India</p>
  <form class="search-bar" onsubmit="doSearch(event)">
    <input type="text" id="hero-search-input" placeholder="Search by make or model…" autocomplete="off">
    <button type="submit">Search</button>
  </form>
</div>

<div class="page-wrapper">

  <!-- Featured Cars -->
  <section style="margin-bottom:2.5rem;">
    <div class="section-header">
      <h2 class="section-title">Featured Cars</h2>
      <a href="car-listings.html" class="section-link">View all &rarr;</a>
    </div>
    <div id="featured-grid" class="car-grid">
      <div class="empty-state"><p>Loading…</p></div>
    </div>
  </section>

  <!-- Recommended -->
  <section>
    <div class="section-header">
      <h2 class="section-title">Recommended for You</h2>
      <a href="car-listings.html" class="section-link">Browse all &rarr;</a>
    </div>
    <p id="rec-note" style="font-size:0.82rem;color:var(--muted);margin-bottom:1rem;"></p>
    <div id="recommended-grid" class="car-grid">
      <div class="empty-state"><p>Loading…</p></div>
    </div>
  </section>

</div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/cars.js"></script>
<script src="js/seed-data.js"></script>
<script>
  const user = requireBuyer();
  if (user) {
    seedDataIfEmpty();
    mountNav('nav-placeholder', renderBuyerNav('home'), user);
    renderPage(user);
  }

  function renderPage(user) {
    const allCars     = getCars();
    const available   = allCars.filter(c => c.status === 'available');

    /* ── Featured: top 4 by health score ─────────── */
    const featured = [...available]
      .sort((a, b) => (b.healthScore ?? 0) - (a.healthScore ?? 0))
      .slice(0, 4);

    document.getElementById('featured-grid').innerHTML =
      featured.length
        ? featured.map(c => buildCarCard(c, user.id, true)).join('')
        : '<div class="empty-state"><p>No cars available yet.</p></div>';

    /* ── Recommended: last viewed price ±20% + fuel ── */
    const rv      = getRecentlyViewed(user.id);
    let recCars   = [];
    let recNote   = '';

    if (rv.length > 0) {
      const lastCar = allCars.find(c => c.id === rv[0].carId);
      if (lastCar) {
        const lo = lastCar.price * 0.8;
        const hi = lastCar.price * 1.2;
        recCars = available.filter(c =>
          c.id !== lastCar.id && c.price >= lo && c.price <= hi && c.fuelType === lastCar.fuelType
        ).slice(0, 3);
        recNote = `Based on your interest in ${lastCar.make} ${lastCar.model} (${lastCar.fuelType}, ${formatPrice(lastCar.price)})`;
      }
    }

    if (recCars.length < 3) {
      const fallback = [...available]
        .sort((a, b) => new Date(b.listingDate) - new Date(a.listingDate))
        .filter(c => !recCars.find(r => r.id === c.id))
        .slice(0, 3 - recCars.length);
      recCars = [...recCars, ...fallback];
      if (!rv.length) recNote = 'Showing the most recently listed cars';
    }

    document.getElementById('rec-note').textContent = recNote;
    document.getElementById('recommended-grid').innerHTML =
      recCars.length
        ? recCars.map(c => buildCarCard(c, user.id, true)).join('')
        : '<div class="empty-state"><p>No recommendations yet. Start browsing!</p></div>';
  }

  function doSearch(e) {
    e.preventDefault();
    const q = document.getElementById('hero-search-input').value.trim();
    if (q) window.location.href = `car-listings.html?q=${encodeURIComponent(q)}`;
    else   window.location.href = 'car-listings.html';
  }
</script>

</body>
</html>
