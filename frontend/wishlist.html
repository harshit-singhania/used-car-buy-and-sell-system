<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .wishlist-page {
      min-height: 100vh;
      background: var(--bg);
    }

    .top-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .top-nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .top-nav-links a,
    .top-nav-links button {
      color: var(--text);
      background: transparent;
      border: none;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
    }

    .top-nav-links a:hover,
    .top-nav-links button:hover {
      background: var(--bg);
      color: var(--primary);
    }

    .top-nav-links .active {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .page-wrapper {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 2.5rem;
    }

    .section-header {
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0;
    }

    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .wishlist-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .wishlist-card:hover {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
      border-color: var(--primary);
    }

    .wishlist-card-image {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
    }

    .wishlist-card-image.sold {
      background: #ef4444;
    }

    .wishlist-card-image.sold::after {
      content: 'SOLD';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      opacity: 0.8;
      letter-spacing: 0.1em;
    }

    .wishlist-card-image.sold::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .wishlist-card-body {
      padding: 1rem;
    }

    .wishlist-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0 0 0.5rem 0;
    }

    .wishlist-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .wishlist-card-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .wishlist-card-price.sold-price {
      text-decoration: line-through;
      color: var(--text-light);
    }

    .wishlist-card-info {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.8rem;
    }

    .wishlist-card-info span {
      padding: 0.25rem 0.5rem;
      background: var(--bg);
      border-radius: 0.25rem;
    }

    .health-badge {
      display: inline-block;
      padding: 0.35rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .health-good {
      background: #dcfce7;
      color: #166534;
    }

    .health-average {
      background: #fef3c7;
      color: #92400e;
    }

    .health-poor {
      background: #fee2e2;
      color: #b91c1c;
    }

    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 0.25rem;
      margin-left: 0.5rem;
    }

    .status-available {
      background: #dcfce7;
      color: #166534;
    }

    .status-sold {
      background: #fee2e2;
      color: #b91c1c;
    }

    .wishlist-card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    .btn-outline:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-danger {
      background: transparent;
      color: #dc2626;
      border-color: #dc2626;
    }

    .btn-danger:hover:not(:disabled) {
      background: #fee2e2;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1.25rem;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0 0 0.5rem 0;
    }

    .empty-state p {
      color: var(--text-light);
      margin: 0 0 1.5rem 0;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .alert.visible {
      display: block;
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .added-date {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 0.5rem;
    }

    .wishlist-card-actions-full {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

<div class="wishlist-page">
  <div id="nav-placeholder"></div>

  <div class="page-wrapper">
    <div id="success-alert" class="alert alert-success"></div>

    <div class="section-header">
      <h1 class="section-title" id="wishlist-title">My Wishlist</h1>
    </div>

    <div id="wishlist-content"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/cars.js"></script>

<script>
  let currentUser = null;

  document.addEventListener('DOMContentLoaded', function () {
    currentUser = getCurrentUser();

    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    if (typeof seedCarsIfEmpty === 'function') {
      seedCarsIfEmpty();
    }

    renderNav(currentUser);
    loadWishlist(currentUser);
  });

  function renderNav(user) {
    const nav = document.getElementById('nav-placeholder');

    nav.innerHTML = `
      <header class="top-nav">
        <div class="top-nav-inner">
          <div class="top-nav-left">
            <div class="brand-logo" style="font-size:1.55rem;">
              UsedCar<span>Mart</span>
            </div>
            <span class="badge badge-buyer">BUYER</span>
          </div>

          <nav class="top-nav-links">
            <a href="buyer-home.html">Home</a>
            <a href="car-listings.html">Browse</a>
            <a href="wishlist.html" class="active">Wishlist</a>
            <a href="recently-viewed.html">Recent</a>
            <button type="button" onclick="logoutBuyer()">Logout</button>
          </nav>
        </div>
      </header>
    `;
  }

  function logoutBuyer() {
    clearCurrentUser();
    window.location.href = 'login.html';
  }

  function loadWishlist(user) {
    const wishlistKey = 'ucm_wishlist_' + String(user.id || user.userId);
    const wishlistIds = JSON.parse(localStorage.getItem(wishlistKey)) || [];
    const allCars = getCars();

    const wishlistedCars = wishlistIds
      .map(function (carId) {
        return allCars.find(function (car) {
          return String(car.id) === String(carId);
        });
      })
      .filter(function (car) {
        return car !== undefined;
      });

    const titleEl = document.getElementById('wishlist-title');
    titleEl.textContent = 'My Wishlist (' + wishlistedCars.length + ' car' + (wishlistedCars.length !== 1 ? 's' : '') + ')';

    const content = document.getElementById('wishlist-content');

    if (!wishlistedCars.length) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <h3>Your wishlist is empty</h3>
          <p>Browse cars to add some to your wishlist!</p>
          <a href="car-listings.html" class="btn btn-primary" style="width: auto; margin-top: 1rem;">Browse Cars</a>
        </div>
      `;
      return;
    }

    content.innerHTML = `<div class="wishlist-grid">${wishlistedCars.map(renderWishlistCard).join('')}</div>`;
  }

  function renderWishlistCard(car) {
    const score = car.healthScore ?? calculateHealthScore(car.year, car.mileage);
    const band = getHealthBand(score);
    const isSold = String(car.status || 'available').toLowerCase() === 'sold';
    const bg = makeColor(car.make);
    const addedDateStr = formatAddedDate(car.id);

    return `
      <div class="wishlist-card">
        <div class="wishlist-card-image ${isSold ? 'sold' : ''}" style="${!isSold ? 'background:' + bg + ';' : ''}">
          ${escapeHtml(String(car.make || '?').charAt(0))}
        </div>

        <div class="wishlist-card-body">
          <div class="wishlist-card-title">
            ${escapeHtml(car.make)} ${escapeHtml(car.model)}
            <span class="status-badge status-${isSold ? 'sold' : 'available'}">
              ${isSold ? 'SOLD' : 'Available'}
            </span>
          </div>

          <div class="wishlist-card-meta">
            <span>${escapeHtml(car.year)}</span>
            <span>${escapeHtml(car.transmission)}</span>
          </div>

          <div class="wishlist-card-price ${isSold ? 'sold-price' : ''}">
            ${formatPrice(car.price)}
          </div>

          <span class="health-badge ${band.cls}">
            ${escapeHtml(score)} ${escapeHtml(band.label)}
          </span>

          <div class="wishlist-card-info">
            <span>${escapeHtml(car.fuelType)}</span>
            <span>${formatKilometers(car.mileage)}</span>
          </div>

          <div class="added-date">
            Added ${addedDateStr}
          </div>

          <div class="wishlist-card-actions ${isSold ? 'wishlist-card-actions-full' : ''}">
            <a href="car-details.html?id=${encodeURIComponent(car.id)}" class="btn btn-outline">View Details</a>
            <button type="button" class="btn btn-danger" onclick="removeFromWishlist('${escapeAttr(car.id)}', '${escapeAttr(currentUser.id || currentUser.userId)}')">Remove</button>
            ${!isSold ? '<a href="purchase.html?id=' + encodeURIComponent(car.id) + '" class="btn btn-primary">Buy Now</a>' : '<button type="button" class="btn btn-outline" disabled title="This car has been sold">Buy Now</button>'}
          </div>
        </div>
      </div>
    `;
  }

  function removeFromWishlist(carId, userId) {
    const wishlistKey = 'ucm_wishlist_' + String(userId);
    const wishlist = JSON.parse(localStorage.getItem(wishlistKey)) || [];

    const updated = wishlist.filter(function (id) {
      return id !== carId;
    });

    localStorage.setItem(wishlistKey, JSON.stringify(updated));

    showSuccessAlert('Removed from wishlist');

    setTimeout(function () {
      loadWishlist(currentUser);
    }, 300);
  }

  function showSuccessAlert(message) {
    const alertEl = document.getElementById('success-alert');
    alertEl.textContent = message;
    alertEl.classList.add('visible');

    setTimeout(function () {
      alertEl.classList.remove('visible');
    }, 3000);
  }

  function formatAddedDate(carId) {
    const key = 'ucm_wishlist_dates_' + String(currentUser.id || currentUser.userId);
    const dates = JSON.parse(localStorage.getItem(key)) || {};

    const timestamp = dates[carId];

    if (!timestamp) {
      return 'recently';
    }

    const date = new Date(timestamp);

    if (isNaN(date.getTime())) {
      return 'recently';
    }

    const now = new Date();
    const diff = now - date;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);

    if (days > 0) {
      return days + ' day' + (days > 1 ? 's' : '') + ' ago';
    }

    if (hours > 0) {
      return hours + ' hour' + (hours > 1 ? 's' : '') + ' ago';
    }

    if (minutes > 0) {
      return minutes + ' minute' + (minutes > 1 ? 's' : '') + ' ago';
    }

    return 'just now';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return String(value ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '&quot;');
  }

  window.removeFromWishlist = removeFromWishlist;
  window.logoutBuyer = logoutBuyer;
</script>

</body>
</html>
