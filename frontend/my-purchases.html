<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Purchases — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page { min-height: 100vh; background: var(--bg); }
    .top-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .top-nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .top-nav-links { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .top-nav-links a,
    .top-nav-links button {
      color: var(--text);
      background: transparent;
      border: none;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
    }
    .top-nav-links .active { background: #dbeafe; color: #1d4ed8; }

    .wrapper { max-width: 1080px; margin: 0 auto; padding: 1.5rem 1.25rem 2.25rem; }
    .head h1 { color: var(--primary); font-size: 1.6rem; margin-bottom: 0.2rem; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      margin: 1rem 0 1.1rem;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    .stat label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .stat strong { color: var(--primary); font-size: 1.08rem; }
    .list { display: grid; gap: 0.75rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .title { font-size: 1.04rem; color: var(--primary); font-weight: 800; margin-bottom: 0.2rem; }
    .muted { color: var(--muted); font-size: 0.84rem; }
    .amount { color: var(--accent); font-weight: 900; font-size: 1.2rem; }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.45rem;
      margin-top: 0.7rem;
    }
    .chip {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem 0.55rem;
      font-size: 0.8rem;
    }
    .chip b { color: var(--muted); font-size: 0.72rem; display: block; margin-bottom: 0.12rem; }
    .actions { display: flex; gap: 0.55rem; flex-wrap: wrap; margin-top: 0.8rem; }
    .actions .btn { width: auto; margin-top: 0; }
    .empty {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
      padding: 1.3rem;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    @media (max-width: 900px) {
      .summary, .meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">
  <div id="nav-placeholder"></div>
  <main class="wrapper">
    <section class="head">
      <h1 id="page-title">My Purchases</h1>
      <p class="muted">Track all your bought cars and quickly rate sellers.</p>
    </section>
    <section id="summary"></section>
    <section id="content"></section>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/cars.js"></script>
<script>
  const PURCHASES_KEY = 'ucm_purchases';
  let currentUser = null;

  document.addEventListener('DOMContentLoaded', function () {
    currentUser = getCurrentUser();
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }
    if (String(currentUser.role || '').trim().toLowerCase() !== 'buyer') {
      clearCurrentUser();
      window.location.href = 'login.html';
      return;
    }
    renderNav();
    renderPurchases();
  });

  function renderNav() {
    document.getElementById('nav-placeholder').innerHTML = `
      <header class="top-nav">
        <div class="top-nav-inner">
          <div class="brand-logo" style="font-size:1.55rem;">UsedCar<span>Mart</span></div>
          <nav class="top-nav-links">
            <a href="buyer-home.html">Home</a>
            <a href="car-listings.html">Browse</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="recently-viewed.html">Recent</a>
            <a href="my-purchases.html" class="active">My Purchases</a>
            <a href="compare-cars.html">Compare Cars</a>
            <a href="support.html">Support</a>
            <button type="button" onclick="logoutBuyer()">Logout</button>
          </nav>
        </div>
      </header>
    `;
  }

  function renderPurchases() {
    const buyerId = currentUser.id || currentUser.userId;
    const purchases = getPurchases()
      .filter(function (purchase) {
        return String(purchase.buyerId) === String(buyerId);
      })
      .sort(function (a, b) {
        return new Date(b.purchaseDate || 0) - new Date(a.purchaseDate || 0);
      });

    document.getElementById('page-title').textContent = 'My Purchases (' + purchases.length + ' total)';
    renderSummary(purchases);

    const content = document.getElementById('content');
    if (!purchases.length) {
      content.innerHTML = `
        <div class="empty">
          <h2 style="color:var(--primary);margin-bottom:0.4rem;">You have not purchased any cars yet</h2>
          <p class="muted" style="margin-bottom:0.8rem;">Start browsing and complete your first purchase.</p>
          <a class="btn btn-primary" href="car-listings.html" style="width:auto;">Browse Cars</a>
        </div>
      `;
      return;
    }

    const reviews = typeof getReviews === 'function' ? getReviews() : (JSON.parse(localStorage.getItem('ucm_reviews')) || []);

    content.innerHTML = `
      <div class="list">
        ${purchases.map(function (purchase) {
          const car = getCarById(purchase.carId);
          if (!car) return '';

          const currentRating = getSellerRatingSummary(purchase.sellerId);
          const ratingAtPurchase = purchase.sellerRatingAtPurchase != null
            ? Number(purchase.sellerRatingAtPurchase).toFixed(1)
            : (currentRating ? Number(currentRating.avg).toFixed(1) : null);
          const sellerName = purchase.sellerNameAtPurchase || getSellerName(purchase.sellerId);

          const reviewed = reviews.some(function (review) {
            return String(review.purchaseId) === String(purchase.id) &&
                   String(review.buyerId) === String(buyerId);
          });

          return `
            <article class="card">
              <div class="card-top">
                <div>
                  <div class="title">${escapeHtml(car.make)} ${escapeHtml(car.model)} (${escapeHtml(car.year)})</div>
                  <div class="muted">Transaction ID: <strong>${escapeHtml(purchase.id)}</strong></div>
                </div>
                <div class="amount">${formatPrice(purchase.amount)}</div>
              </div>

              <div class="meta">
                <div class="chip"><b>Purchase Date</b>${formatDate(purchase.purchaseDate)}</div>
                <div class="chip"><b>Seller</b>${escapeHtml(sellerName)}</div>
                <div class="chip"><b>Seller Rating at Purchase</b>${ratingAtPurchase ? (renderStars(ratingAtPurchase) + ' ' + escapeHtml(ratingAtPurchase) + '/5') : 'No ratings yet'}</div>
                <div class="chip"><b>Status</b>${escapeHtml(String(car.status || 'sold').toUpperCase())}</div>
              </div>

              <div class="actions">
                <a class="btn btn-secondary" href="car-details.html?id=${encodeURIComponent(car.id)}">View Car Details</a>
                ${reviewed
                  ? '<button type="button" class="btn btn-secondary" disabled style="opacity:0.6;">Reviewed</button>'
                  : '<a class="btn btn-primary" href="purchase.html?reviewPurchase=' + encodeURIComponent(purchase.id) + '">Rate Seller</a>'}
              </div>
            </article>
          `;
        }).join('')}
      </div>
    `;
  }

  function renderSummary(purchases) {
    const totalSpent = purchases.reduce(function (sum, purchase) {
      return sum + Number(purchase.amount || 0);
    }, 0);

    const mostRecentDate = purchases.length
      ? formatDate(purchases[0].purchaseDate)
      : '—';

    document.getElementById('summary').innerHTML = `
      <div class="summary">
        <div class="stat">
          <label>Total Amount Spent</label>
          <strong>${formatPrice(totalSpent)}</strong>
        </div>
        <div class="stat">
          <label>Total Cars Bought</label>
          <strong>${purchases.length}</strong>
        </div>
        <div class="stat">
          <label>Most Recent Purchase</label>
          <strong>${mostRecentDate}</strong>
        </div>
      </div>
    `;
  }

  function getPurchases() {
    return JSON.parse(localStorage.getItem(PURCHASES_KEY)) || [];
  }

  function getSellerName(sellerId) {
    const users = getUsers();
    const seller = users.find(function (user) {
      return String(user.id || user.userId) === String(sellerId);
    });
    return seller ? (seller.fullName || seller.userId || 'Seller') : 'Seller';
  }

  function formatDate(value) {
    const date = new Date(value || Date.now());
    if (isNaN(date.getTime())) return '—';
    const day = String(date.getDate()).padStart(2, '0');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const month = months[date.getMonth()];
    const year = date.getFullYear();
    return `${day}-${month}-${year}`;
  }

  function renderStars(value) {
    const rating = Math.round(Number(value || 0));
    let stars = '';
    for (let i = 1; i <= 5; i++) {
      stars += i <= rating ? '★' : '☆';
    }
    return stars;
  }

  function logoutBuyer() {
    clearCurrentUser();
    window.location.href = 'login.html';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  window.logoutBuyer = logoutBuyer;
</script>
</body>
</html>
