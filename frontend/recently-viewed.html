<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recently Viewed — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .recent-page {
      min-height: 100vh;
      background: var(--bg);
    }

    .top-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .top-nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .top-nav-links a,
    .top-nav-links button {
      color: var(--text);
      background: transparent;
      border: none;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
    }

    .top-nav-links a:hover,
    .top-nav-links button:hover {
      background: var(--bg);
      color: var(--primary);
    }

    .top-nav-links .active {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .page-wrapper {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 2.5rem;
    }

    .section-header {
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0;
    }

    .recent-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .recent-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.25rem;
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 1.25rem;
      align-items: center;
      transition: all 0.3s ease;
    }

    .recent-card:hover {
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      border-color: var(--primary);
    }

    .recent-card-image {
      width: 120px;
      height: 100px;
      border-radius: 0.375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: rgba(255, 255, 255, 0.3);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
    }

    .recent-card-image.sold {
      background: #ef4444;
    }

    .recent-card-image.sold::after {
      content: 'SOLD';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 1rem;
      font-weight: 900;
      color: white;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    .recent-card-image.sold::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1;
    }

    .recent-card-body {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .recent-card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0;
    }

    .recent-card-details {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-light);
      flex-wrap: wrap;
    }

    .recent-card-detail-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .recent-card-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0.5rem 0 0 0;
    }

    .recent-card-info {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .recent-card-info span {
      padding: 0.3rem 0.6rem;
      background: var(--bg);
      border-radius: 0.25rem;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .health-badge {
      display: inline-block;
      padding: 0.35rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 0.25rem;
    }

    .health-good {
      background: #dcfce7;
      color: #166534;
    }

    .health-average {
      background: #fef3c7;
      color: #92400e;
    }

    .health-poor {
      background: #fee2e2;
      color: #b91c1c;
    }

    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 0.25rem;
    }

    .status-available {
      background: #dcfce7;
      color: #166534;
    }

    .status-sold {
      background: #fee2e2;
      color: #b91c1c;
    }

    .recent-card-actions {
      display: flex;
      gap: 0.75rem;
      flex-direction: column;
    }

    .btn {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
      width: 100%;
    }

    .btn-outline:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border-color: var(--primary);
      width: 100%;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #dbeafe;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1.25rem;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0 0 0.5rem 0;
    }

    .empty-state p {
      color: var(--text-light);
      margin: 0 0 1.5rem 0;
    }

    .viewed-timestamp {
      font-size: 0.8rem;
      color: var(--text-light);
      padding: 0.3rem 0.6rem;
      background: var(--bg);
      border-radius: 0.25rem;
    }

    @media (max-width: 768px) {
      .recent-card {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .recent-card-image {
        width: 100%;
        height: 120px;
      }

      .recent-card-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>

<div class="recent-page">
  <div id="nav-placeholder"></div>

  <div class="page-wrapper">
    <div class="section-header">
      <h1 class="section-title">Recently Viewed Cars</h1>
    </div>

    <div id="recent-content"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/cars.js"></script>

<script>
  let currentUser = null;

  document.addEventListener('DOMContentLoaded', function () {
    currentUser = getCurrentUser();

    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    if (typeof seedCarsIfEmpty === 'function') {
      seedCarsIfEmpty();
    }

    renderNav(currentUser);
    loadRecentlyViewed(currentUser);
  });

  function renderNav(user) {
    const nav = document.getElementById('nav-placeholder');

    nav.innerHTML = `
      <header class="top-nav">
        <div class="top-nav-inner">
          <div class="top-nav-left">
            <div class="brand-logo" style="font-size:1.55rem;">
              UsedCar<span>Mart</span>
            </div>
            <span class="badge badge-buyer">BUYER</span>
          </div>

          <nav class="top-nav-links">
            <a href="buyer-home.html">Home</a>
            <a href="car-listings.html">Browse</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="recently-viewed.html" class="active">Recent</a>
            <button type="button" onclick="logoutBuyer()">Logout</button>
          </nav>
        </div>
      </header>
    `;
  }

  function logoutBuyer() {
    clearCurrentUser();
    window.location.href = 'login.html';
  }

  function loadRecentlyViewed(user) {
    const recentKey = 'ucm_recently_viewed_' + String(user.id || user.userId);
    const recentIds = JSON.parse(localStorage.getItem(recentKey)) || [];
    const allCars = getCars();

    /*
      Remove duplicates and keep the most recent occurrence.
      Show maximum 10 entries in reverse chronological order (most recent first).
    */
    const seenCars = {};
    const uniqueRecentIds = [];

    for (let i = 0; i < recentIds.length; i++) {
      const carId = recentIds[i];

      if (!seenCars[carId]) {
        seenCars[carId] = true;
        uniqueRecentIds.push(carId);
      }
    }

    const maxRecent = uniqueRecentIds.slice(0, 10);

    const recentCars = maxRecent
      .map(function (carId) {
        return allCars.find(function (car) {
          return String(car.id) === String(carId);
        });
      })
      .filter(function (car) {
        return car !== undefined;
      });

    const content = document.getElementById('recent-content');

    if (!recentCars.length) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🚗</div>
          <h3>You have not viewed any cars yet</h3>
          <p>Start browsing to see your recently viewed cars here!</p>
          <a href="car-listings.html" class="btn btn-primary" style="width: auto; margin-top: 1rem;">Browse Cars</a>
        </div>
      `;
      return;
    }

    content.innerHTML = `<div class="recent-list">${recentCars.map(renderRecentCard).join('')}</div>`;
  }

  function renderRecentCard(car) {
    const score = car.healthScore ?? calculateHealthScore(car.year, car.mileage);
    const band = getHealthBand(score);
    const isSold = String(car.status || 'available').toLowerCase() === 'sold';
    const bg = makeColor(car.make);
    const viewedAt = getViewedTimestamp(car.id);

    return `
      <div class="recent-card">
        <div class="recent-card-image ${isSold ? 'sold' : ''}" style="${!isSold ? 'background:' + bg + ';' : ''}">
          ${escapeHtml(String(car.make || '?').charAt(0))}
        </div>

        <div class="recent-card-body">
          <h3 class="recent-card-title">
            ${escapeHtml(car.make)} ${escapeHtml(car.model)} ${escapeHtml(car.year)}
            <span class="status-badge status-${isSold ? 'sold' : 'available'}" style="margin-left:0.5rem;">
              ${isSold ? 'SOLD' : 'Available'}
            </span>
          </h3>

          <div class="recent-card-details">
            <span class="recent-card-detail-item">
              ⛽ ${escapeHtml(car.fuelType)}
            </span>
            <span class="recent-card-detail-item">
              🔧 ${escapeHtml(car.transmission)}
            </span>
            <span class="recent-card-detail-item">
              📊 ${formatKilometers(car.mileage)}
            </span>
          </div>

          <div class="recent-card-price">${formatPrice(car.price)}</div>

          <div class="recent-card-info">
            <span class="health-badge ${band.cls}">
              ${escapeHtml(score)} ${escapeHtml(band.label)}
            </span>
            <span class="viewed-timestamp">
              Viewed ${viewedAt}
            </span>
          </div>
        </div>

        <div class="recent-card-actions">
          <a href="car-details.html?id=${encodeURIComponent(car.id)}" class="btn btn-primary">View Again</a>
          <button type="button" class="btn btn-secondary" onclick="addToWishlistFromRecent('${escapeAttr(car.id)}', '${escapeAttr(currentUser.id || currentUser.userId)}')">
            ♡ Add to Wishlist
          </button>
        </div>
      </div>
    `;
  }

  function addToWishlistFromRecent(carId, userId) {
    const wishlistKey = 'ucm_wishlist_' + String(userId);
    const wishlist = JSON.parse(localStorage.getItem(wishlistKey)) || [];

    if (!wishlist.includes(carId)) {
      wishlist.push(carId);
      localStorage.setItem(wishlistKey, JSON.stringify(wishlist));

      /*
        Store when this car was added to wishlist.
      */
      const dateKey = 'ucm_wishlist_dates_' + String(userId);
      const dates = JSON.parse(localStorage.getItem(dateKey)) || {};
      dates[carId] = new Date().toISOString();
      localStorage.setItem(dateKey, JSON.stringify(dates));

      alert('Added to wishlist!');
    } else {
      alert('Already in your wishlist.');
    }
  }

  function getViewedTimestamp(carId) {
    const key = 'ucm_recently_viewed_times_' + String(currentUser.id || currentUser.userId);
    const times = JSON.parse(localStorage.getItem(key)) || {};

    const timestamp = times[carId];

    if (!timestamp) {
      return 'recently';
    }

    const date = new Date(timestamp);

    if (isNaN(date.getTime())) {
      return 'recently';
    }

    const now = new Date();
    const diff = now - date;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);

    if (days > 0) {
      return 'on ' + date.toLocaleDateString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
    }

    if (hours > 0) {
      return hours + ' hour' + (hours > 1 ? 's' : '') + ' ago';
    }

    if (minutes > 0) {
      return minutes + ' minute' + (minutes > 1 ? 's' : '') + ' ago';
    }

    return 'just now';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return String(value ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '&quot;');
  }

  window.addToWishlistFromRecent = addToWishlistFromRecent;
  window.logoutBuyer = logoutBuyer;
</script>

</body>
</html>
