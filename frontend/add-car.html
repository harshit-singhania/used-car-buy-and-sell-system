<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Car — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="add-car-wrapper">
  <div class="auth-card wide" style="max-width:100%;">

    <h1 class="auth-title">Add New Car Listing</h1>
    <p class="auth-subtitle">Fill in your car's details — health score and fraud check are calculated automatically</p>

    <div class="alert alert-success" id="success-alert"></div>
    <div class="alert alert-error" id="error-alert"></div>

    <form id="add-car-form" novalidate>

      <!-- ── Car Details ──────────────────────────── -->
      <p class="form-section-title">Car Details</p>
      <div class="form-grid">

        <div class="field">
          <label for="make">Make <span class="required">*</span></label>
          <select id="make">
            <option value="">Select make</option>
            <option>Maruti</option>
            <option>Hyundai</option>
            <option>Honda</option>
            <option>Toyota</option>
            <option>Tata</option>
            <option>Mahindra</option>
            <option>Kia</option>
            <option>Ford</option>
            <option>Volkswagen</option>
            <option>BMW</option>
            <option>Others</option>
          </select>
          <span class="error-msg" id="make-error"></span>
        </div>

        <div class="field">
          <label for="model">Model <span class="required">*</span></label>
          <input type="text" id="model" placeholder="e.g. Swift, Creta" maxlength="30">
          <span class="error-msg" id="model-error"></span>
        </div>

        <div class="field">
          <label for="year">Year <span class="required">*</span></label>
          <select id="year">
            <option value="">Select year</option>
          </select>
          <span class="error-msg" id="year-error"></span>
        </div>

        <div class="field">
          <label for="color">Color <span class="required">*</span></label>
          <select id="color">
            <option value="">Select color</option>
            <option>White</option>
            <option>Black</option>
            <option>Silver</option>
            <option>Red</option>
            <option>Blue</option>
            <option>Grey</option>
            <option>Others</option>
          </select>
          <span class="error-msg" id="color-error"></span>
        </div>

      </div>

      <!-- ── Performance Details ──────────────────── -->
      <p class="form-section-title">Performance Details</p>
      <div class="form-grid">

        <div class="field">
          <label>Fuel Type <span class="required">*</span></label>
          <div class="radio-group" style="flex-wrap:wrap;gap:1rem 2rem;">
            <label class="radio-option"><input type="radio" name="fuelType" value="Petrol"> Petrol</label>
            <label class="radio-option"><input type="radio" name="fuelType" value="Diesel"> Diesel</label>
            <label class="radio-option"><input type="radio" name="fuelType" value="CNG"> CNG</label>
            <label class="radio-option"><input type="radio" name="fuelType" value="Electric"> Electric</label>
          </div>
          <span class="error-msg" id="fuelType-error"></span>
        </div>

        <div class="field">
          <label>Transmission <span class="required">*</span></label>
          <div class="radio-group">
            <label class="radio-option"><input type="radio" name="transmission" value="Manual"> Manual</label>
            <label class="radio-option"><input type="radio" name="transmission" value="Automatic"> Automatic</label>
          </div>
          <span class="error-msg" id="transmission-error"></span>
        </div>

        <div class="field">
          <label for="mileage">Mileage (km) <span class="required">*</span></label>
          <input type="number" id="mileage" placeholder="e.g. 25000" min="0" max="500000">
          <span class="error-msg" id="mileage-error"></span>
        </div>

      </div>

      <!-- ── Pricing ──────────────────────────────── -->
      <p class="form-section-title">Pricing</p>
      <div class="form-grid">

        <div class="field">
          <label for="price">Asking Price (₹) <span class="required">*</span></label>
          <input type="number" id="price" placeholder="e.g. 650000" min="25000" max="10000000">
          <div class="market-hint" id="market-hint"></div>
          <span class="error-msg" id="price-error"></span>
        </div>

      </div>

      <!-- ── Buttons ──────────────────────────────── -->
      <div class="form-actions">
        <div class="primary-actions">
          <button type="submit" class="btn btn-primary modern-btn">
            Submit Listing
          </button>

          <button type="button" class="btn btn-secondary modern-btn" id="preview-btn">
            Preview
          </button>
        </div>

        <button type="button" class="btn btn-reset modern-btn" id="reset-btn">
          Reset Form
        </button>
      </div>

    </form>
  </div>
</div>

<!-- Preview modal -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closePreview()">&times;</button>
    <h3 style="margin-bottom:1.25rem;color:var(--primary);">Listing Preview</h3>
    <div id="preview-content"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/cars.js"></script>
<script src="js/seed-data.js"></script>

<script>
  let user = null;

  const FIELD_IDS = [
    'make',
    'model',
    'year',
    'color',
    'fuelType',
    'transmission',
    'mileage',
    'price'
  ];

  document.addEventListener('DOMContentLoaded', function () {
    /*
      IMPORTANT FIX:
      Populate the year dropdown immediately after DOM loads.
      This must not depend on requireSeller(), otherwise the dropdown may remain empty.
    */
    populateYears();

    user = requireSeller();

    if (user) {
      seedDataIfEmpty();
      mountNav('nav-placeholder', renderSellerNav('add'), user);
    }

    wireRealTimePrice();
    wireSubmitHandler();
    wirePreviewHandler();
    wireResetHandler();
  });

  /* Populate year dropdown */
  function populateYears() {
    const sel = document.getElementById('year');
    if (!sel) return;

    // Keep only the first placeholder option
    sel.options.length = 1;

    const currentYear = new Date().getFullYear();

    for (let y = currentYear; y >= 2000; y--) {
      const option = document.createElement('option');
      option.value = String(y);
      option.textContent = String(y);
      sel.appendChild(option);
    }
  }

  /* Real-time market price hint */
  function wireRealTimePrice() {
    const priceEl = document.getElementById('price');
    const makeEl = document.getElementById('make');
    const yearEl = document.getElementById('year');

    if (priceEl) {
      priceEl.addEventListener('input', updateMarketHint);
    }

    if (makeEl) {
      makeEl.addEventListener('change', updateMarketHint);
    }

    if (yearEl) {
      yearEl.addEventListener('change', updateMarketHint);
    }
  }

  function updateMarketHint() {
    const make = document.getElementById('make').value;
    const year = parseInt(document.getElementById('year').value, 10);
    const hint = document.getElementById('market-hint');

    if (!hint) return;

    if (!make || isNaN(year)) {
      hint.classList.remove('visible');
      hint.textContent = '';
      return;
    }

    const avg = getAveragePrice(make, year, getCars());

    if (avg === null) {
      hint.classList.remove('visible');
      hint.textContent = '';
      return;
    }

    hint.textContent = `Market average for ${make} ${year}: ${formatPrice(avg)}`;
    hint.classList.add('visible');
  }

  /* ── Validation ───────────────────────────────── */
  function validateForm() {
    clearAllFieldErrors(FIELD_IDS);
    hideAlert('error-alert');

    let valid = true;

    const make = document.getElementById('make').value;
    const model = document.getElementById('model').value.trim();
    const year = document.getElementById('year').value;
    const color = document.getElementById('color').value;
    const fuelTypeEl = document.querySelector('input[name="fuelType"]:checked');
    const transEl = document.querySelector('input[name="transmission"]:checked');
    const mileage = parseFloat(document.getElementById('mileage').value);
    const price = parseFloat(document.getElementById('price').value);

    if (!make) {
      showFieldError('make', 'Please select a make');
      valid = false;
    }

    if (!model) {
      showFieldError('model', 'Model name is required');
      valid = false;
    }

    if (!year) {
      showFieldError('year', 'Please select a year');
      valid = false;
    }

    if (!color) {
      showFieldError('color', 'Please select a color');
      valid = false;
    }

    if (!fuelTypeEl) {
      showFieldError('fuelType', 'Please select fuel type');
      valid = false;
    }

    if (!transEl) {
      showFieldError('transmission', 'Please select transmission');
      valid = false;
    }

    if (isNaN(mileage) || mileage < 0) {
      showFieldError('mileage', 'Please enter valid mileage');
      valid = false;
    } else if (mileage > 500000) {
      showFieldError('mileage', 'Mileage cannot exceed 5,00,000 km');
      valid = false;
    }

    if (isNaN(price) || price < 25000 || price > 10000000) {
      showFieldError('price', 'Price must be between ₹25,000 and ₹1,00,00,000');
      valid = false;
    }

    return valid;
  }

  /* ── Submit ───────────────────────────────────── */
  function wireSubmitHandler() {
    const form = document.getElementById('add-car-form');
    if (!form) return;

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (!validateForm()) return;

      if (!user) {
        showAlert('error-alert', 'You must be logged in as a seller to add a car listing.');
        return;
      }

      const allCars = getCars();

      const make = document.getElementById('make').value;
      const year = parseInt(document.getElementById('year').value, 10);
      const mileage = parseFloat(document.getElementById('mileage').value);
      const price = parseFloat(document.getElementById('price').value);

      const newCar = {
        id: 'CAR' + Date.now(),
        make: make,
        model: document.getElementById('model').value.trim(),
        year: year,
        price: price,
        mileage: mileage,
        fuelType: document.querySelector('input[name="fuelType"]:checked').value,
        transmission: document.querySelector('input[name="transmission"]:checked').value,
        color: document.getElementById('color').value,
        sellerId: user.id,
        status: 'available',
        viewCount: 0,
        listingDate: new Date().toISOString(),
        healthScore: calculateHealthScore(year, mileage)
      };

      /*
        Calculate fraud flag against existing + new car.
      */
      newCar.fraudFlag = isFraudFlagged(price, make, year, [...allCars, newCar]);

      allCars.push(newCar);
      saveCars(allCars);

      showAlert('success-alert', `Car listed successfully! Listing ID: ${newCar.id}`);

      form.reset();

      const hint = document.getElementById('market-hint');
      if (hint) {
        hint.classList.remove('visible');
        hint.textContent = '';
      }

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });

      /*
        Redirect to dashboard after 2 seconds.
      */
      setTimeout(function () {
        window.location.href = 'seller-dashboard.html';
      }, 2000);
    });
  }

  /* ── Preview ──────────────────────────────────── */
  function wirePreviewHandler() {
    const previewBtn = document.getElementById('preview-btn');
    if (!previewBtn) return;

    previewBtn.addEventListener('click', function () {
      const make = document.getElementById('make').value || '—';
      const model = document.getElementById('model').value.trim() || '—';
      const year = document.getElementById('year').value || '—';
      const color = document.getElementById('color').value || '—';
      const fuel = document.querySelector('input[name="fuelType"]:checked')?.value || '—';
      const trans = document.querySelector('input[name="transmission"]:checked')?.value || '—';
      const mil = document.getElementById('mileage').value || '—';

      const price = parseFloat(document.getElementById('price').value);
      const priceFmt = isNaN(price) ? '—' : formatPrice(price);

      const parsedYear = parseInt(year, 10);
      const parsedMileage = parseFloat(mil);

      const score = (!isNaN(parsedYear) && !isNaN(parsedMileage))
        ? calculateHealthScore(parsedYear, parsedMileage)
        : '—';

      const band = typeof score === 'number' ? getHealthBand(score) : null;

      document.getElementById('preview-content').innerHTML = `
        <div class="car-img-placeholder"
          style="
            background:${makeColor(make)};
            border-radius:8px;
            height:130px;
            font-size:3rem;
            font-weight:900;
            display:flex;
            align-items:center;
            justify-content:center;
            color:rgba(255,255,255,0.25);
            margin-bottom:1rem;
          ">
          ${make[0] || '?'}
        </div>

        <h3 style="color:var(--primary);margin-bottom:0.25rem;">
          ${make} ${model}
        </h3>

        <p style="color:var(--muted);font-size:0.82rem;margin-bottom:0.6rem;">
          ${year} &bull; ${fuel} &bull; ${trans}
        </p>

        <p style="font-size:1.4rem;font-weight:900;color:var(--accent);margin-bottom:0.75rem;">
          ${priceFmt}
        </p>

        <table class="specs-table">
          <tr>
            <td>Color</td>
            <td>${color}</td>
          </tr>
          <tr>
            <td>Mileage</td>
            <td>${isNaN(parsedMileage) ? '—' : Number(parsedMileage).toLocaleString('en-IN') + ' km'}</td>
          </tr>
        </table>

        ${
          band
            ? `<span class="health-badge ${band.cls}" style="margin-top:0.75rem;display:inline-block;">
                &#9679; ${score} ${band.label}
              </span>`
            : ''
        }
      `;

      document.getElementById('preview-modal').classList.add('visible');
    });
  }

  function closePreview() {
    document.getElementById('preview-modal').classList.remove('visible');
  }

  /*
    Needed because the HTML button uses onclick="closePreview()".
  */
  window.closePreview = closePreview;

  /* ── Reset ────────────────────────────────────── */
  function wireResetHandler() {
    const resetBtn = document.getElementById('reset-btn');
    if (!resetBtn) return;

    resetBtn.addEventListener('click', function () {
      document.getElementById('add-car-form').reset();

      clearAllFieldErrors(FIELD_IDS);
      hideAlert('error-alert');
      hideAlert('success-alert');

      const hint = document.getElementById('market-hint');
      if (hint) {
        hint.classList.remove('visible');
        hint.textContent = '';
      }
    });
  }
</script>

</body>
</html>
