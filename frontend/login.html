<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyer Login — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">UsedCar<span>Mart</span></div>
      <div class="brand-tagline">India's Trusted Used Car Marketplace</div>
    </div>

    <h1 class="auth-title">Buyer Login</h1>
    <p class="auth-subtitle">Sign in to browse and purchase cars</p>

    <!-- Alerts -->
    <div class="alert alert-error" id="login-error"></div>
    <div class="alert alert-warning" id="forgot-hint"></div>

    <form id="login-form" novalidate>

      <div class="field">
        <label for="userId">User ID <span class="required">*</span></label>
        <input
          type="text"
          id="userId"
          placeholder="Enter your User ID"
          minlength="5"
          maxlength="20"
          autocomplete="username"
        >
        <span class="error-msg" id="userId-error"></span>
      </div>

      <div class="field">
        <label for="password">Password <span class="required">*</span></label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          maxlength="30"
          autocomplete="current-password"
        >
        <span class="error-msg" id="password-error"></span>
      </div>

      <div class="forgot-row">
        <a href="#" id="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>

    </form>

    <div class="divider">or</div>

    <p class="auth-footer">
      New User? <a href="register.html">Register here</a>
    </p>

    <p class="auth-footer" style="margin-top:0.5rem;">
      Are you a Seller? <a href="login-seller.html">Seller Login &rarr;</a>
    </p>

  </div>
</div>

<script src="js/auth.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('login-form');
    const forgotLink = document.getElementById('forgot-link');

    if (!form) {
      console.error('Login form not found.');
      return;
    }

    if (typeof getUsers !== 'function') {
      console.error('auth.js not loaded. getUsers() is missing.');
      alert('System error: auth.js is not loading.');
      return;
    }

    console.log('Buyer login page loaded.');
    console.log('Users from localStorage:', getUsers());

    /* Clear banner when user starts editing */
    ['userId', 'password'].forEach(function (id) {
      const input = document.getElementById(id);

      if (input) {
        input.addEventListener('input', function () {
          hideAlert('login-error');
          hideAlert('forgot-hint');
          clearFieldError(id);
        });
      }
    });

    /* Forgot Password */
    if (forgotLink) {
      forgotLink.addEventListener('click', function (e) {
        e.preventDefault();
        hideAlert('login-error');

        const userId = document.getElementById('userId').value.trim();

        if (!userId) {
          showAlert(
            'forgot-hint',
            'Enter your User ID above and click Forgot Password again to see your hint.'
          );
          return;
        }

        const user = getUsers().find(function (u) {
          return String(u.userId || '').trim() === userId;
        });

        if (user) {
          showAlert(
            'forgot-hint',
            `Password hint: Your account is registered with city "${user.city || 'Not available'}". ` +
            `Contact support@usedcarmart.com if you need further help.`
          );
        } else {
          showAlert('forgot-hint', 'No account found with that User ID.');
        }
      });
    }

    /* Login submit */
    form.addEventListener('submit', function (e) {
      e.preventDefault();

      console.log('Login button clicked.');

      hideAlert('login-error');
      hideAlert('forgot-hint');
      clearFieldError('userId');
      clearFieldError('password');

      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!userId || !password) {
        showAlert('login-error', 'Please fill in all fields');

        if (!userId) {
          showFieldError('userId', 'User ID is required');
        }

        if (!password) {
          showFieldError('password', 'Password is required');
        }

        return;
      }

      const users = getUsers();

      const user = users.find(function (u) {
        return String(u.userId || '').trim() === userId &&
               String(u.password || '').trim() === password;
      });

      console.log('Entered User ID:', userId);
      console.log('Matched user:', user);

      if (!user) {
        showAlert('login-error', 'Invalid User ID or Password');
        return;
      }

      const role = String(user.role || '').trim().toLowerCase();

      console.log('Matched role:', role);

      if (role !== 'buyer') {
        showAlert('login-error', 'This account is not a Buyer account. Please use Seller Login.');
        return;
      }

      setCurrentUser(user);

      console.log('Saved current user:', getCurrentUser());

      window.location.href = './buyer-home.html';
    });
  });
</script>

</body>
</html>
