<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Car — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .add-car-wrapper {
      max-width: 980px;
      margin: 1.5rem auto 2.5rem;
      padding: 0 1rem;
    }

    .add-car-wrapper .auth-card.wide {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 1.8rem;
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.1);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      margin: 0 auto;
    }

    .form-intro {
      margin-bottom: 1.35rem;
      font-size: 0.84rem;
      color: var(--muted);
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
    }

    .form-panel {
      border: 1px solid #e8eef5;
      background: #ffffff;
      border-radius: 14px;
      padding: 1rem 1rem 0.35rem;
      margin-bottom: 0.9rem;
    }

    .add-car-wrapper .form-section-title {
      margin-top: 0;
      border-bottom: none;
      color: var(--primary);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      background: #eff6ff;
      display: inline-block;
      border-radius: 999px;
      padding: 0.28rem 0.65rem;
      margin-bottom: 0.95rem;
    }

    .add-car-wrapper .form-grid {
      gap: 0.15rem 0.9rem;
    }

    .add-car-wrapper .field label {
      margin-bottom: 0.45rem;
      font-weight: 700;
      color: #0f172a;
    }

    .add-car-wrapper input,
    .add-car-wrapper select {
      border-radius: 10px;
      border-color: #d9e2ec;
      background: #fdfefe;
      min-height: 42px;
    }

    .add-car-wrapper input:hover,
    .add-car-wrapper select:hover {
      border-color: #c3d1df;
    }

    .add-car-wrapper .radio-group {
      gap: 0.7rem;
      padding: 0;
      flex-wrap: wrap;
    }

    .add-car-wrapper .radio-option {
      border: 1px solid #d6e0eb;
      border-radius: 999px;
      padding: 0.5rem 0.95rem;
      min-height: 48px;
      background: #f8fbff;
      font-size: 0.83rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      color: #0f172a;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, transform 0.18s ease;
    }

    .add-car-wrapper .radio-option:hover {
      border-color: #b8c8dd;
      background: #f3f8ff;
      transform: translateY(-1px);
    }

    .add-car-wrapper .radio-option:has(input[type="radio"]:checked) {
      border-color: #3b82f6;
      background: #eaf2ff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
    }

    .add-car-wrapper .radio-option input[type="radio"] {
      margin: 0;
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #2563eb;
      flex-shrink: 0;
    }

    .add-car-wrapper .radio-option input[type="radio"]:focus-visible {
      outline: 2px solid #60a5fa;
      outline-offset: 2px;
    }

    .add-car-wrapper .radio-label {
      line-height: 1;
    }

    .add-car-wrapper .market-hint.visible {
      margin-top: 0.45rem;
      font-size: 0.78rem;
      color: #1d4ed8;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      padding: 0.45rem 0.55rem;
    }

    .add-car-wrapper .form-actions {
      margin-top: 1rem;
      justify-content: flex-start;
      gap: 0.85rem;
    }

    .add-car-wrapper .primary-actions {
      gap: 0.85rem;
    }

    .add-car-wrapper .form-actions .btn {
      min-width: 200px;
    }

    .add-car-wrapper .btn-reset {
      margin-left: 0;
    }

    .section-performance .field-mileage-full {
      grid-column: 1 / -1;
    }

    .section-pricing .form-grid {
      grid-template-columns: 1fr;
    }

    @media (max-width: 680px) {
      .add-car-wrapper {
        margin-top: 1rem;
      }

      .add-car-wrapper .auth-card.wide {
        padding: 1.2rem 1rem;
      }

      .add-car-wrapper .form-actions .btn {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="add-car-wrapper">
  <div class="auth-card wide">

    <h1 class="auth-title">Add New Car Listing</h1>
    <p class="auth-subtitle">Fill in your car's details — health score and fraud check are calculated automatically</p>
    <p class="form-intro">Tips: keep details accurate and use a realistic price to get better buyer responses.</p>

    <div class="alert alert-success" id="success-alert"></div>
    <div class="alert alert-error" id="error-alert"></div>

    <form id="add-car-form" novalidate>

      <!-- ── Car Details ──────────────────────────── -->
      <section class="form-panel">
      <p class="form-section-title">Car Details</p>
      <div class="form-grid">

        <div class="field">
          <label for="make">Make <span class="required">*</span></label>
          <select id="make">
            <option value="">Select make</option>
            <option>Maruti</option>
            <option>Hyundai</option>
            <option>Honda</option>
            <option>Toyota</option>
            <option>Tata</option>
            <option>Mahindra</option>
            <option>Kia</option>
            <option>Ford</option>
            <option>Volkswagen</option>
            <option>BMW</option>
            <option>Others</option>
          </select>
          <span class="error-msg" id="make-error"></span>
        </div>

        <div class="field">
          <label for="model">Model <span class="required">*</span></label>
          <input type="text" id="model" placeholder="e.g. Swift, Creta" maxlength="30">
          <span class="error-msg" id="model-error"></span>
        </div>

        <div class="field">
          <label for="year">Year <span class="required">*</span></label>
          <select id="year">
            <option value="">Select year</option>
          </select>
          <span class="error-msg" id="year-error"></span>
        </div>

        <div class="field">
          <label for="color">Color <span class="required">*</span></label>
          <select id="color">
            <option value="">Select color</option>
            <option>White</option>
            <option>Black</option>
            <option>Silver</option>
            <option>Red</option>
            <option>Blue</option>
            <option>Grey</option>
            <option>Others</option>
          </select>
          <span class="error-msg" id="color-error"></span>
        </div>

      </div>
      </section>

      <!-- ── Performance Details ──────────────────── -->
      <section class="form-panel section-performance">
      <p class="form-section-title">Performance Details</p>
      <div class="form-grid">

        <div class="field">
          <label>Fuel Type <span class="required">*</span></label>
          <div class="radio-group">
            <label class="radio-option"><input type="radio" name="fuelType" value="Petrol"><span class="radio-label">Petrol</span></label>
            <label class="radio-option"><input type="radio" name="fuelType" value="Diesel"><span class="radio-label">Diesel</span></label>
            <label class="radio-option"><input type="radio" name="fuelType" value="CNG"><span class="radio-label">CNG</span></label>
            <label class="radio-option"><input type="radio" name="fuelType" value="Electric"><span class="radio-label">Electric</span></label>
          </div>
          <span class="error-msg" id="fuelType-error"></span>
        </div>

        <div class="field">
          <label>Transmission <span class="required">*</span></label>
          <div class="radio-group">
            <label class="radio-option"><input type="radio" name="transmission" value="Manual"><span class="radio-label">Manual</span></label>
            <label class="radio-option"><input type="radio" name="transmission" value="Automatic"><span class="radio-label">Automatic</span></label>
          </div>
          <span class="error-msg" id="transmission-error"></span>
        </div>

        <div class="field field-mileage-full">
          <label for="mileage">Mileage (km) <span class="required">*</span></label>
          <input type="number" id="mileage" placeholder="e.g. 25000" min="0" max="500000">
          <span class="error-msg" id="mileage-error"></span>
        </div>

      </div>
      </section>

      <!-- ── Pricing ──────────────────────────────── -->
      <section class="form-panel section-pricing">
      <p class="form-section-title">Pricing</p>
      <div class="form-grid">

        <div class="field">
          <label for="price">Asking Price (₹) <span class="required">*</span></label>
          <input type="number" id="price" placeholder="e.g. 650000" min="25000" max="10000000">
          <div class="market-hint" id="market-hint"></div>
          <span class="error-msg" id="price-error"></span>
        </div>

      </div>
      </section>

      <!-- ── Buttons ──────────────────────────────── -->
      <div class="form-actions">
        <div class="primary-actions">
          <button type="submit" class="btn btn-primary modern-btn">
            Submit Listing
          </button>

          <button type="button" class="btn btn-secondary modern-btn" id="preview-btn">
            Preview
          </button>
        </div>

        <button type="button" class="btn btn-reset modern-btn" id="reset-btn">
          Reset Form
        </button>
      </div>

    </form>
  </div>
</div>

<!-- Preview modal -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closePreview()">&times;</button>
    <h3 style="margin-bottom:1.25rem;color:var(--primary);">Listing Preview</h3>
    <div id="preview-content"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/cars.js"></script>

<script>
  let user = null;

  const FIELD_IDS = [
    'make',
    'model',
    'year',
    'color',
    'fuelType',
    'transmission',
    'mileage',
    'price'
  ];

  document.addEventListener('DOMContentLoaded', function () {
    populateYears();

    user = getCurrentUser();
    if (!user) { window.location.href = 'login-seller.html'; return; }
    if (String(user.role || '').trim().toLowerCase() !== 'seller') {
      clearCurrentUser(); window.location.href = 'login-seller.html'; return;
    }

    seedCarsIfEmpty();
    renderNav(user);

    wireRealTimePrice();
    wireSubmitHandler();
    wirePreviewHandler();
    wireResetHandler();
  });

  function renderNav(user) {
    document.getElementById('nav-placeholder').innerHTML = `
      <header style="background:var(--card);border-bottom:1px solid var(--border);box-shadow:0 8px 24px rgba(15,23,42,0.06);position:sticky;top:0;z-index:20;">
        <div style="max-width:1180px;margin:0 auto;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
          <div style="display:flex;align-items:center;gap:1rem;">
            <div class="brand-logo" style="font-size:1.55rem;">UsedCar<span>Mart</span></div>
            <span style="background:#fef3c7;color:#92400e;padding:0.3rem 0.75rem;border-radius:999px;font-size:0.72rem;font-weight:800;letter-spacing:0.06em;">SELLER</span>
          </div>
          <nav style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
            <a href="seller-dashboard.html" style="color:var(--text);text-decoration:none;font-weight:700;padding:0.4rem 0.65rem;border-radius:999px;">Dashboard</a>
            <a href="add-car.html" style="background:#dbeafe;color:#1d4ed8;text-decoration:none;font-weight:700;padding:0.4rem 0.65rem;border-radius:999px;">+ Add Car</a>
            <button type="button" onclick="logoutSeller()" style="color:var(--text);background:transparent;border:none;font-weight:700;cursor:pointer;padding:0.4rem 0.65rem;border-radius:999px;">Logout</button>
          </nav>
        </div>
      </header>`;
  }

  function logoutSeller() { clearCurrentUser(); window.location.href = 'login-seller.html'; }
  window.logoutSeller = logoutSeller;

  /* Populate year dropdown */
  function populateYears() {
    const sel = document.getElementById('year');
    if (!sel) return;

    // Keep only the first placeholder option
    sel.options.length = 1;

    const currentYear = new Date().getFullYear();

    for (let y = currentYear; y >= 2000; y--) {
      const option = document.createElement('option');
      option.value = String(y);
      option.textContent = String(y);
      sel.appendChild(option);
    }
  }

  /* Real-time market price hint */
  function wireRealTimePrice() {
    const priceEl = document.getElementById('price');
    const makeEl = document.getElementById('make');
    const yearEl = document.getElementById('year');

    if (priceEl) {
      priceEl.addEventListener('input', updateMarketHint);
    }

    if (makeEl) {
      makeEl.addEventListener('change', updateMarketHint);
    }

    if (yearEl) {
      yearEl.addEventListener('change', updateMarketHint);
    }
  }

  function updateMarketHint() {
    const make = document.getElementById('make').value;
    const year = parseInt(document.getElementById('year').value, 10);
    const hint = document.getElementById('market-hint');

    if (!hint) return;

    if (!make || isNaN(year)) {
      hint.classList.remove('visible');
      hint.textContent = '';
      return;
    }

    hint.classList.remove('visible');
    hint.textContent = '';
  }

  /* ── Validation ───────────────────────────────── */
  function validateForm() {
    clearAllFieldErrors(FIELD_IDS);
    hideAlert('error-alert');

    let valid = true;

    const make = document.getElementById('make').value;
    const model = document.getElementById('model').value.trim();
    const year = document.getElementById('year').value;
    const color = document.getElementById('color').value;
    const fuelTypeEl = document.querySelector('input[name="fuelType"]:checked');
    const transEl = document.querySelector('input[name="transmission"]:checked');
    const mileage = parseFloat(document.getElementById('mileage').value);
    const price = parseFloat(document.getElementById('price').value);

    if (!make) {
      showFieldError('make', 'Please select a make');
      valid = false;
    }

    if (!model) {
      showFieldError('model', 'Model name is required');
      valid = false;
    }

    if (!year) {
      showFieldError('year', 'Please select a year');
      valid = false;
    }

    if (!color) {
      showFieldError('color', 'Please select a color');
      valid = false;
    }

    if (!fuelTypeEl) {
      showFieldError('fuelType', 'Please select fuel type');
      valid = false;
    }

    if (!transEl) {
      showFieldError('transmission', 'Please select transmission');
      valid = false;
    }

    if (isNaN(mileage) || mileage < 0) {
      showFieldError('mileage', 'Please enter valid mileage');
      valid = false;
    } else if (mileage > 500000) {
      showFieldError('mileage', 'Mileage cannot exceed 5,00,000 km');
      valid = false;
    }

    if (isNaN(price) || price < 25000 || price > 10000000) {
      showFieldError('price', 'Price must be between ₹25,000 and ₹1,00,00,000');
      valid = false;
    }

    return valid;
  }

  /* ── Submit ───────────────────────────────────── */
  function wireSubmitHandler() {
    const form = document.getElementById('add-car-form');
    if (!form) return;

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (!validateForm()) return;

      if (!user) {
        showAlert('error-alert', 'You must be logged in as a seller to add a car listing.');
        return;
      }

      const allCars = getCars();

      const make = document.getElementById('make').value;
      const year = parseInt(document.getElementById('year').value, 10);
      const mileage = parseFloat(document.getElementById('mileage').value);
      const price = parseFloat(document.getElementById('price').value);

      const newCar = {
        id: 'CAR' + Date.now(),
        make: make,
        model: document.getElementById('model').value.trim(),
        year: year,
        price: price,
        mileage: mileage,
        fuelType: document.querySelector('input[name="fuelType"]:checked').value,
        transmission: document.querySelector('input[name="transmission"]:checked').value,
        color: document.getElementById('color').value,
        sellerId: user.id,
        status: 'available',
        viewCount: 0,
        listingDate: new Date().toISOString(),
        healthScore: calculateHealthScore(year, mileage)
      };

      allCars.push(newCar);
      saveCars(allCars);

      showAlert('success-alert', `Car listed successfully! Listing ID: ${newCar.id}`);

      form.reset();

      const hint = document.getElementById('market-hint');
      if (hint) {
        hint.classList.remove('visible');
        hint.textContent = '';
      }

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });

      /*
        Redirect to dashboard after 2 seconds.
      */
      setTimeout(function () {
        window.location.href = 'seller-dashboard.html';
      }, 2000);
    });
  }

  /* ── Preview ──────────────────────────────────── */
  function wirePreviewHandler() {
    const previewBtn = document.getElementById('preview-btn');
    if (!previewBtn) return;

    previewBtn.addEventListener('click', function () {
      const make = document.getElementById('make').value || '—';
      const model = document.getElementById('model').value.trim() || '—';
      const year = document.getElementById('year').value || '—';
      const color = document.getElementById('color').value || '—';
      const fuel = document.querySelector('input[name="fuelType"]:checked')?.value || '—';
      const trans = document.querySelector('input[name="transmission"]:checked')?.value || '—';
      const mil = document.getElementById('mileage').value || '—';

      const price = parseFloat(document.getElementById('price').value);
      const priceFmt = isNaN(price) ? '—' : formatPrice(price);

      const parsedYear = parseInt(year, 10);
      const parsedMileage = parseFloat(mil);

      const score = (!isNaN(parsedYear) && !isNaN(parsedMileage))
        ? calculateHealthScore(parsedYear, parsedMileage)
        : '—';

      const band = typeof score === 'number' ? getHealthBand(score) : null;

      document.getElementById('preview-content').innerHTML = `
        <div class="car-img-placeholder"
          style="
            background:${makeColor(make)};
            border-radius:8px;
            height:130px;
            font-size:3rem;
            font-weight:900;
            display:flex;
            align-items:center;
            justify-content:center;
            color:rgba(255,255,255,0.25);
            margin-bottom:1rem;
          ">
          ${make[0] || '?'}
        </div>

        <h3 style="color:var(--primary);margin-bottom:0.25rem;">
          ${make} ${model}
        </h3>

        <p style="color:var(--muted);font-size:0.82rem;margin-bottom:0.6rem;">
          ${year} &bull; ${fuel} &bull; ${trans}
        </p>

        <p style="font-size:1.4rem;font-weight:900;color:var(--accent);margin-bottom:0.75rem;">
          ${priceFmt}
        </p>

        <table class="specs-table">
          <tr>
            <td>Color</td>
            <td>${color}</td>
          </tr>
          <tr>
            <td>Mileage</td>
            <td>${isNaN(parsedMileage) ? '—' : Number(parsedMileage).toLocaleString('en-IN') + ' km'}</td>
          </tr>
        </table>

        ${
          band
            ? `<span class="health-badge ${band.cls}" style="margin-top:0.75rem;display:inline-block;">
                &#9679; ${score} ${band.label}
              </span>`
            : ''
        }
      `;

      document.getElementById('preview-modal').classList.add('visible');
    });
  }

  function closePreview() {
    document.getElementById('preview-modal').classList.remove('visible');
  }

  /*
    Needed because the HTML button uses onclick="closePreview()".
  */
  window.closePreview = closePreview;

  /* ── Reset ────────────────────────────────────── */
  function wireResetHandler() {
    const resetBtn = document.getElementById('reset-btn');
    if (!resetBtn) return;

    resetBtn.addEventListener('click', function () {
      document.getElementById('add-car-form').reset();

      clearAllFieldErrors(FIELD_IDS);
      hideAlert('error-alert');
      hideAlert('success-alert');

      const hint = document.getElementById('market-hint');
      if (hint) {
        hint.classList.remove('visible');
        hint.textContent = '';
      }
    });
  }
</script>

</body>
</html>
