<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Details — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* ─── Page shell ───────────────────────────────────── */

    .detail-page {
      min-height: 100vh;
      background: var(--bg);
    }

    .top-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .top-nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .top-nav-links a,
    .top-nav-links button {
      color: var(--text);
      background: transparent;
      border: none;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
    }

    .top-nav-links a:hover,
    .top-nav-links button:hover {
      background: var(--bg);
      color: var(--primary);
    }

    .top-nav-links .active {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .page-wrapper {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 2.5rem;
    }

    .breadcrumb {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    /* ─── Details layout ───────────────────────────────── */

    .car-details-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.75fr);
      gap: 1.25rem;
      align-items: start;
    }

    .main-card,
    .sidebar-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.07);
    }

    .main-card {
      overflow: hidden;
    }

    .car-detail-image {
      height: 310px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7rem;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.26);
      letter-spacing: -0.08em;
      position: relative;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status-available {
      background: #dcfce7;
      color: #15803d;
    }

    .status-sold {
      background: #fee2e2;
      color: #991b1b;
    }

    .main-card-body {
      padding: 1.35rem;
    }

    .car-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .car-detail-title {
      color: var(--primary);
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .car-detail-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 0.85rem;
    }

    .car-detail-price {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 1.1rem;
    }

    .specs-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .specs-table tr {
      border-bottom: 1px solid var(--border);
    }

    .specs-table tr:last-child {
      border-bottom: none;
    }

    .specs-table td {
      padding: 0.85rem 0.95rem;
      font-size: 0.9rem;
    }

    .specs-table td:first-child {
      color: var(--muted);
      font-weight: 800;
      background: #f8fafc;
      width: 38%;
    }

    .specs-table td:last-child {
      color: var(--text);
      font-weight: 800;
    }

    /* ─── Sidebar ──────────────────────────────────────── */

    .sidebar-card {
      padding: 1.1rem;
      margin-bottom: 1rem;
    }

    .sidebar-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.85rem;
    }

    .health-circle-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .health-circle {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      background:
        conic-gradient(var(--hc-color) calc(var(--score) * 1%), #e2e8f0 0);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .health-circle-inner {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .health-circle-score {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .health-circle-lbl {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 800;
      margin-top: 0.2rem;
      text-align: center;
    }

    .health-breakdown {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .info-box {
      border-radius: 12px;
      padding: 0.85rem;
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .info-box.safe {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #86efac;
    }

    .info-box.danger {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .info-box.warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    .seller-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 0.9rem;
    }

    .seller-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .seller-name {
      color: var(--primary);
      font-weight: 900;
    }

    .seller-meta {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .star-rating {
      color: #f59e0b;
      letter-spacing: 0.05em;
    }

    .action-btns {
      display: grid;
      gap: 0.75rem;
    }

    .action-btns .btn {
      width: 100%;
      margin-top: 0;
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 1.5px solid var(--border);
    }

    .btn-outline:hover {
      background: #f8fafc;
      border-color: rgba(26, 46, 74, 0.32);
    }

    .btn-danger {
      background: rgba(220, 38, 38, 0.09);
      color: var(--error);
      border: 1.5px solid rgba(220, 38, 38, 0.24);
    }

    .btn-danger:hover {
      background: rgba(220, 38, 38, 0.14);
    }

    /* ─── Also viewed ──────────────────────────────────── */

    .section-header {
      margin: 1.5rem 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .section-title {
      color: var(--primary);
      font-size: 1.15rem;
      font-weight: 900;
    }

    .also-viewed-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .mini-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .mini-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.11);
    }

    .mini-card-img {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.26);
    }

    .mini-card-body {
      padding: 0.9rem;
    }

    .mini-card-title {
      color: var(--primary);
      font-weight: 900;
      font-size: 0.92rem;
      margin-bottom: 0.35rem;
    }

    .mini-card-price {
      color: var(--accent);
      font-size: 1rem;
      font-weight: 900;
    }

    .health-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.3rem 0.6rem;
    }

    .health-good {
      background: #dcfce7;
      color: #15803d;
    }

    .health-average {
      background: #fef3c7;
      color: #92400e;
    }

    .health-poor {
      background: #fee2e2;
      color: #991b1b;
    }

    /* ─── Empty state ──────────────────────────────────── */

    .empty-state {
      background: var(--card);
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--muted);
      max-width: 720px;
      margin: 2rem auto;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 0.8rem;
    }

    .empty-state h3 {
      color: var(--primary);
      margin-bottom: 0.35rem;
    }

    /* ─── Modal ────────────────────────────────────────── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 100;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal-box {
      background: var(--card);
      border-radius: 18px;
      width: 100%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 1.4rem;
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.28);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 0.8rem;
      right: 0.9rem;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 1.25rem;
      color: var(--muted);
    }

    .contact-modal-info {
      display: grid;
      gap: 0.65rem;
    }

    .contact-modal-info p {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem;
      font-size: 0.9rem;
    }

    /* ─── Responsive ───────────────────────────────────── */

    @media (max-width: 900px) {
      .car-details-grid {
        grid-template-columns: 1fr;
      }

      .also-viewed-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .top-nav-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .top-nav-left {
        justify-content: space-between;
      }

      .top-nav-links {
        width: 100%;
      }

      .top-nav-links a,
      .top-nav-links button {
        flex: 1;
        text-align: center;
      }

      .car-detail-image {
        height: 230px;
        font-size: 5rem;
      }

      .health-circle-wrap {
        flex-direction: column;
        align-items: flex-start;
      }

      .also-viewed-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="detail-page">

  <div id="nav-placeholder"></div>

  <div id="page-content">
    <!-- injected by JS -->
  </div>

</div>

<!-- Contact seller modal -->
<div class="modal-overlay" id="contact-modal">
  <div class="modal-box">
    <button class="modal-close" type="button" onclick="closeContactModal()">&times;</button>
    <h3 style="margin-bottom:1rem;color:var(--primary);">Seller Contact Details</h3>
    <div id="contact-info" class="contact-modal-info"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/cars.js"></script>

<script>
  let currentUser = null;
  let currentCar = null;
  let currentSeller = null;

  document.addEventListener('DOMContentLoaded', function () {
    currentUser = getCurrentUser();

    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    if (String(currentUser.role || '').trim().toLowerCase() !== 'buyer') {
      clearCurrentUser();
      window.location.href = 'login.html';
      return;
    }

    if (typeof seedCarsIfEmpty === 'function') {
      seedCarsIfEmpty();
    }

    renderFallbackNav(currentUser);

    const carId = getQueryParamSafe('id');
    loadCarDetails(currentUser, carId);
  });

  function renderFallbackNav(user) {
    const nav = document.getElementById('nav-placeholder');

    nav.innerHTML = `
      <header class="top-nav">
        <div class="top-nav-inner">
          <div class="top-nav-left">
            <div class="brand-logo" style="font-size:1.55rem;">
              UsedCar<span>Mart</span>
            </div>
            <span class="badge badge-buyer">BUYER</span>
          </div>

          <nav class="top-nav-links">
            <a href="buyer-home.html">Home</a>
            <a href="car-listings.html">Browse</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="recently-viewed.html">Recent</a>
            <a href="my-purchases.html">My Purchases</a>
            <a href="compare-cars.html">Compare Cars</a>
            <a href="support.html">Support</a>
            <button type="button" onclick="logoutBuyer()">Logout</button>
          </nav>
        </div>
      </header>
    `;
  }

  function logoutBuyer() {
    clearCurrentUser();
    window.location.href = 'login.html';
  }

  function getCarImage(car) {
    const imageMap = {
      'Maruti Swift': 'static/swift.png',
      'Hyundai Creta': 'static/creta.png',
      'Honda City': 'static/city.png',
      'Tata Nexon': 'static/nexon.png',
      'Toyota Innova': 'static/toyota.png',
      'Kia Seltos': 'static/kia.png'
    };

    const key = car.make + ' ' + (car.model.split(' ')[0]);
    
    return imageMap[key] || null;
  }

  function loadCarDetails(user, carId) {
    const content = document.getElementById('page-content');

    if (!carId) {
      content.innerHTML = notFound();
      return;
    }

    const allCars = getCars();
    const car = allCars.find(function (item) {
      return String(item.id) === String(carId);
    });

    if (!car) {
      content.innerHTML = notFound();
      return;
    }

    currentCar = car;

    if (typeof incrementViewCount === 'function') {
      incrementViewCount(car.id);
      car.viewCount = Number(car.viewCount || 0) + 1;
    }

    addRecentlyViewed(user.id || user.userId, car.id);

    const score = car.healthScore ?? calculateHealthScore(car.year, car.mileage);
    const band = normalizeHealthBand(getHealthBand(score));
    const bg = makeColor(car.make);
    const imagePath = getCarImage(car);
    const wished = isInWishlist(user.id || user.userId, car.id);

    const avg = getAveragePrice(car.make, car.year, allCars);
    const isFraud = isFraudFlagged(car.price, car.make, car.year, allCars);
    const diffPct = avg ? Math.round(((Number(car.price) - Number(avg)) / Number(avg)) * 100) : null;

    const diffLabel = diffPct !== null
      ? (diffPct >= 0 ? diffPct + '% above' : Math.abs(diffPct) + '% below') + ' market average'
      : 'Not enough data for comparison';

    const seller = findSellerForCar(car);
    currentSeller = seller;

    const sellerRating = getSellerRatingSafe(car.sellerId);
    const sellerRecentReviews = getRecentSellerReviews(car.sellerId, 3);
    const sellerCarsSold = allCars.filter(function (item) {
      return String(item.sellerId) === String(car.sellerId) &&
             String(item.status || '').toLowerCase() === 'sold';
    }).length;

    const ageDeduction = calculateAgeDeduction(car.year);
    const mileageDeduction = calculateMileageDeduction(car.mileage);

    const alsoViewed = getAlsoViewedCars(car, allCars);

    content.innerHTML = `
      <div class="page-wrapper">
        <div class="breadcrumb">
          <a href="buyer-home.html">Dashboard</a> / Car Details / ${escapeHtml(car.id)}
        </div>

        <div class="car-details-grid">

          <div class="main-card">
            <div class="car-detail-image" style="${imagePath ? '' : 'background:' + bg + ';'}">
              ${imagePath ? `<img src="${imagePath}" alt="${escapeHtml(car.make)} ${escapeHtml(car.model)}" style="width:100%;height:100%;object-fit:cover;">` : ''}
              ${!imagePath ? escapeHtml(String(car.make || '?').charAt(0)) : ''}
            </div>

            <div class="main-card-body">
              <div class="car-title-row">
                <div>
                  <h1 class="car-detail-title">${escapeHtml(car.make)} ${escapeHtml(car.model)}</h1>
                  <p class="car-detail-meta">
                    ${escapeHtml(car.year)} • ${escapeHtml(car.fuelType)} • ${escapeHtml(car.transmission)}
                  </p>
                </div>

                <span class="status-badge status-${escapeAttr(String(car.status || 'available').toLowerCase())}">
                  ${String(car.status || 'available').toLowerCase() === 'available' ? '✓ Available' : 'Sold'}
                </span>
              </div>

              <div class="car-detail-price">${formatPrice(car.price)}</div>

              <table class="specs-table">
                <tr><td>Fuel Type</td><td>${escapeHtml(car.fuelType || '—')}</td></tr>
                <tr><td>Transmission</td><td>${escapeHtml(car.transmission || '—')}</td></tr>
                <tr><td>Mileage</td><td>${formatKilometers(car.mileage)}</td></tr>
                <tr><td>Color</td><td>${escapeHtml(car.color || '—')}</td></tr>
                <tr><td>Year</td><td>${escapeHtml(car.year || '—')}</td></tr>
                <tr><td>Seller City</td><td>${escapeHtml(car.sellerCity || seller.city || '—')}</td></tr>
                <tr><td>Listed On</td><td>${formatDateSafe(car.listingDate)}</td></tr>
                <tr><td>Views</td><td>${Number(car.viewCount || 0).toLocaleString('en-IN')}</td></tr>
                <tr><td>Listing ID</td><td>${escapeHtml(car.id || '—')}</td></tr>
              </table>
            </div>
          </div>

          <aside>

            <div class="sidebar-card">
              <div class="sidebar-card-title">Car Health Score</div>

              <div class="health-circle-wrap">
                <div class="health-circle" style="--score:${Number(score || 0)};--hc-color:${band.color};">
                  <div class="health-circle-inner">
                    <span class="health-circle-score">${escapeHtml(score || '—')}</span>
                    <span class="health-circle-lbl">${escapeHtml(band.label)}</span>
                  </div>
                </div>

                <p class="health-breakdown">
                  Age Deduction: −${ageDeduction} pts<br>
                  Mileage Deduction: −${mileageDeduction} pts<br>
                  Overall: ${escapeHtml(band.label)}
                </p>
              </div>
            </div>

            <div class="sidebar-card">
              <div class="sidebar-card-title">Price Review</div>

              ${
                isFraud
                  ? '<div class="info-box danger">⚠ Price Alert: This listing is significantly different from similar market prices. Please compare carefully.</div>'
                  : '<div class="info-box safe">✓ Price appears to be within the expected market range.</div>'
              }

              ${
                avg !== null
                  ? `
                    <div style="margin-top:0.85rem;font-size:0.86rem;color:var(--muted);line-height:1.6;">
                      Market Average for ${escapeHtml(car.make)} ${escapeHtml(car.year)}:<br>
                      <strong style="color:var(--text);">${formatPrice(avg)}</strong><br>
                      <span style="color:${diffPct < 0 ? 'var(--error)' : 'var(--success)'};font-weight:800;">
                        This car is ${escapeHtml(diffLabel)}
                      </span>
                    </div>
                  `
                  : `
                    <div style="margin-top:0.85rem;font-size:0.86rem;color:var(--muted);">
                      Not enough similar listings available for market comparison.
                    </div>
                  `
              }
            </div>

            <div class="sidebar-card">
              <div class="sidebar-card-title">Seller Information</div>

              <div class="seller-row">
                <div class="seller-avatar">
                  ${escapeHtml(String(seller.fullName || seller.sellerName || 'S').charAt(0))}
                </div>

                <div>
                  <div class="seller-name">${escapeHtml(seller.fullName || seller.sellerName || 'Seller')}</div>
                  <div class="seller-meta">
                    ${escapeHtml(seller.city || car.sellerCity || 'City not available')}
                    ${seller.registrationDate ? ' • Since ' + formatDateSafe(seller.registrationDate) : ''}
                  </div>
                </div>
              </div>

              ${
                sellerRating
                  ? `
                    <p style="font-size:0.88rem;margin-bottom:0.35rem;">
                      <span class="star-rating">${renderStars(sellerRating.avg)}</span>
                      <strong>${escapeHtml(sellerRating.avg)}</strong>
                      <span style="color:var(--muted);">(${escapeHtml(sellerRating.count)} reviews)</span>
                    </p>
                  `
                  : '<p style="font-size:0.82rem;color:var(--muted);">No reviews yet</p>'
              }

              ${
                sellerRecentReviews.length
                  ? `
                    <div style="margin-top:0.55rem;display:grid;gap:0.45rem;">
                      ${sellerRecentReviews.map(function (review) {
                        return `
                          <div style="border:1px solid var(--border);border-radius:10px;padding:0.45rem 0.55rem;background:#f8fafc;">
                            <div style="font-size:0.76rem;color:var(--muted);display:flex;justify-content:space-between;gap:0.5rem;">
                              <span>${escapeHtml(review.buyerName || 'Buyer')}</span>
                              <span>${formatDateSafe(review.reviewDate)}</span>
                            </div>
                            <div style="font-size:0.82rem;margin-top:0.15rem;">${renderStars(review.rating)} <strong>${escapeHtml(String(review.rating))}</strong></div>
                            ${review.comment ? `<div style="font-size:0.78rem;color:var(--text);margin-top:0.15rem;">${escapeHtml(review.comment)}</div>` : ''}
                          </div>
                        `;
                      }).join('')}
                    </div>
                  `
                  : ''
              }

              <p style="font-size:0.82rem;color:var(--muted);margin-top:0.35rem;">
                ${sellerCarsSold} cars sold
              </p>

              <button class="btn btn-outline" style="width:100%;margin-top:0.85rem;" onclick="showContact()">
                📞 Contact Seller
              </button>
            </div>

            <div class="sidebar-card">
              <div class="sidebar-card-title">Actions</div>

              <div class="action-btns">
                <button id="wishlist-btn" class="btn ${wished ? 'btn-danger' : 'btn-outline'}" onclick="toggleWishlistDetail('${escapeAttr(car.id)}')">
                  ${wished ? '♥ Remove from Wishlist' : '♡ Add to Wishlist'}
                </button>

                ${
                  String(car.status || 'available').toLowerCase() === 'available'
                    ? `
                      <button class="btn btn-primary" style="margin-top:0;" onclick="markInterestedAndBuy('${escapeAttr(car.id)}')">
                        🛒 Buy This Car
                      </button>
                    `
                    : `
                      <button class="btn btn-primary" style="margin-top:0;opacity:0.5;cursor:not-allowed;" disabled>
                        Car Already Sold
                      </button>
                    `
                }

                <button class="btn btn-outline" onclick="handleCompare('${escapeAttr(car.id)}')">
                  ⚖ Compare This Car
                </button>

                <button class="btn btn-outline" onclick="window.location.href='buyer-home.html'">← Back to Home</button>
              </div>
            </div>

          </aside>

        </div>
      </div>

      ${renderAlsoViewed(alsoViewed)}
    `;
  }

  function getAlsoViewedCars(car, allCars) {
    const price = Number(car.price || 0);
    const low = price * 0.85;
    const high = price * 1.15;

    return allCars
      .filter(function (item) {
        if (String(item.id) === String(car.id)) return false;
        if (String(item.status || 'available').toLowerCase() !== 'available') return false;

        const sameFuel = item.fuelType === car.fuelType;
        const similarPrice = Number(item.price || 0) >= low && Number(item.price || 0) <= high;
        const sameMake = item.make === car.make;

        return sameFuel || similarPrice || sameMake;
      })
      .slice(0, 3);
  }

  function renderAlsoViewed(cars) {
    if (!cars.length) return '';

    return `
      <div class="page-wrapper" style="padding-top:0;">
        <div class="section-header">
          <h2 class="section-title">People Also Viewed</h2>
        </div>

        <div class="also-viewed-grid">
          ${cars.map(function (car) {
            const score = car.healthScore ?? calculateHealthScore(car.year, car.mileage);
            const band = normalizeHealthBand(getHealthBand(score));

            return `
              <div class="mini-card" onclick="window.location.href='car-details.html?id=${encodeURIComponent(car.id)}'">
                <div class="mini-card-img" style="background:${makeColor(car.make)};">
                  ${escapeHtml(String(car.make || '?').charAt(0))}
                </div>

                <div class="mini-card-body">
                  <div class="mini-card-title">
                    ${escapeHtml(car.make)} ${escapeHtml(car.model)} ${escapeHtml(car.year)}
                  </div>

                  <div class="mini-card-price">${formatPrice(car.price)}</div>

                  <span class="health-badge ${band.cls}" style="margin-top:0.45rem;">
                    ${escapeHtml(score)} ${escapeHtml(band.label)}
                  </span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  function notFound() {
    return `
      <div class="page-wrapper">
        <div class="empty-state">
          <div class="empty-icon">🚫</div>
          <h3>Car not found</h3>
          <p>This listing may have been removed or the link may be incorrect.</p>
          <a href="buyer-home.html" class="btn btn-primary" style="width:auto;margin-top:1rem;">Go to Home</a>
        </div>
      </div>
    `;
  }

  function findSellerForCar(car) {
    const users = typeof getUsers === 'function' ? getUsers() : [];

    const sellerFromUsers = users.find(function (user) {
      return String(user.id) === String(car.sellerId) ||
             String(user.userId) === String(car.sellerId);
    });

    if (sellerFromUsers) {
      return sellerFromUsers;
    }

    return {
      id: car.sellerId || 'SELLER_NOT_AVAILABLE',
      fullName: car.sellerName || 'Seller',
      sellerName: car.sellerName || 'Seller',
      city: car.sellerCity || 'Not available',
      phone: car.sellerPhone || 'Not available',
      email: car.sellerEmail || 'Not available',
      registrationDate: car.listingDate || ''
    };
  }

  function showContact() {
    if (!currentSeller || !currentCar) return;

    document.getElementById('contact-info').innerHTML = `
      <p><strong>Name:</strong> ${escapeHtml(currentSeller.fullName || currentSeller.sellerName || 'Seller')}</p>
      <p><strong>Phone:</strong> ${escapeHtml(currentSeller.phone || currentSeller.mobile || currentSeller.sellerPhone || 'Not available')}</p>
      <p><strong>Email:</strong> ${escapeHtml(currentSeller.email || currentSeller.sellerEmail || 'Not available')}</p>
      <p><strong>City:</strong> ${escapeHtml(currentSeller.city || currentCar.sellerCity || 'Not available')}</p>
      <p><strong>Listing:</strong> ${escapeHtml(currentCar.make)} ${escapeHtml(currentCar.model)} (${escapeHtml(currentCar.id)})</p>
    `;

    document.getElementById('contact-modal').classList.add('visible');
  }

  function closeContactModal() {
    document.getElementById('contact-modal').classList.remove('visible');
  }

  function toggleWishlistDetail(carId) {
    const key = getWishlistKey(currentUser.id || currentUser.userId);
    const wishlist = JSON.parse(localStorage.getItem(key)) || [];

    const exists = wishlist.includes(carId);
    let updated;

    if (exists) {
      updated = wishlist.filter(function (id) {
        return id !== carId;
      });
    } else {
      updated = wishlist.concat(carId);
    }

    localStorage.setItem(key, JSON.stringify(updated));

    const added = !exists;
    const btn = document.getElementById('wishlist-btn');

    btn.textContent = added ? '♥ Remove from Wishlist' : '♡ Add to Wishlist';
    btn.className = 'btn ' + (added ? 'btn-danger' : 'btn-outline');
  }

  function isInWishlist(userId, carId) {
    const key = getWishlistKey(userId);
    const wishlist = JSON.parse(localStorage.getItem(key)) || [];

    return wishlist.includes(carId);
  }

  function getWishlistKey(userId) {
    return 'ucm_wishlist_' + String(userId || 'guest');
  }

  function handleCompare(carId) {
    const key = getCompareKey(currentUser.id || currentUser.userId);
    const compareList = JSON.parse(localStorage.getItem(key)) || [];

    if (compareList.includes(carId)) {
      alert('This car is already in your comparison list.');
      return;
    }

    if (compareList.length >= 3) {
      alert('Comparison list is full. You can compare up to 3 cars.');
      return;
    }

    compareList.push(carId);
    localStorage.setItem(key, JSON.stringify(compareList));

    alert('Added to comparison list.');
  }

  function getCompareKey(userId) {
    return 'ucm_compare_' + String(userId || 'guest');
  }

  function addRecentlyViewed(userId, carId) {
    const key = 'ucm_recently_viewed_' + String(userId || 'guest');
    const existing = JSON.parse(localStorage.getItem(key)) || [];

    const updated = [
      carId
    ].concat(existing.filter(function (id) {
      return id !== carId;
    })).slice(0, 8);

    localStorage.setItem(key, JSON.stringify(updated));
  }

  function markInterestedAndBuy(carId) {
    const key = 'ucm_interested_' + String(currentUser.id || currentUser.userId || 'guest');
    const list = JSON.parse(localStorage.getItem(key)) || [];

    if (!list.includes(carId)) {
      list.push(carId);
      localStorage.setItem(key, JSON.stringify(list));
    }

    /*
      If you later create purchase.html, this will open it.
      Until then, it safely records interest and shows a message.
    */
    const purchasePage = 'purchase.html?id=' + encodeURIComponent(carId);

    try {
      window.location.href = purchasePage;
    } catch (err) {
      alert('Interest recorded for this car.');
    }
  }

  function getSellerRatingSafe(sellerId) {
    if (typeof getSellerRatingSummary === 'function') {
      const summary = getSellerRatingSummary(sellerId);
      if (summary) return summary;
    }

    const legacyRatings = JSON.parse(localStorage.getItem('ucm_seller_ratings')) || [];
    const sellerRatings = legacyRatings.filter(function (rating) {
      return String(rating.sellerId) === String(sellerId);
    });

    if (!sellerRatings.length) {
      return null;
    }

    const avg = sellerRatings.reduce(function (sum, rating) {
      return sum + Number(rating.rating || 0);
    }, 0) / sellerRatings.length;

    return { avg: avg.toFixed(1), count: sellerRatings.length };
  }

  function getRecentSellerReviews(sellerId, limit) {
    const max = Number(limit || 3);
    let reviews = [];

    if (typeof getReviewsForSeller === 'function') {
      reviews = getReviewsForSeller(sellerId);
    } else {
      reviews = (JSON.parse(localStorage.getItem('ucm_reviews')) || []).filter(function (review) {
        return String(review.sellerId) === String(sellerId);
      });
    }

    return reviews
      .slice()
      .sort(function (a, b) {
        return new Date(b.reviewDate || 0) - new Date(a.reviewDate || 0);
      })
      .slice(0, max)
      .map(function (review) {
        const buyer = findBuyerById(review.buyerId);
        const buyerName = buyer ? String(buyer.fullName || buyer.userId || 'Buyer').split(' ')[0] : 'Buyer';
        return Object.assign({}, review, { buyerName: buyerName });
      });
  }

  function findBuyerById(buyerId) {
    const users = JSON.parse(localStorage.getItem('ucm_users')) || [];
    return users.find(function (user) {
      return String(user.id || user.userId) === String(buyerId);
    }) || null;
  }

  function renderStars(value) {
    const rating = Math.round(Number(value || 0));
    let stars = '';

    for (let i = 1; i <= 5; i++) {
      stars += i <= rating ? '★' : '☆';
    }

    return stars;
  }

  function normalizeHealthBand(band) {
    const label = band && band.label ? band.label : 'Average';
    let cls = band && band.cls ? band.cls : 'health-average';

    if (!['health-good', 'health-average', 'health-poor'].includes(cls)) {
      if (String(label).toLowerCase().includes('excellent') || String(label).toLowerCase().includes('good')) {
        cls = 'health-good';
      } else if (String(label).toLowerCase().includes('attention') || String(label).toLowerCase().includes('poor')) {
        cls = 'health-poor';
      } else {
        cls = 'health-average';
      }
    }

    let color = '#d97706';

    if (cls === 'health-good') {
      color = '#16a34a';
    } else if (cls === 'health-poor') {
      color = '#dc2626';
    }

    return {
      label: label,
      cls: cls,
      color: color
    };
  }

  function calculateAgeDeduction(year) {
    const currentYear = new Date().getFullYear();
    const age = Math.max(0, currentYear - Number(year || currentYear));

    return Math.round(age * 3);
  }

  function calculateMileageDeduction(mileage) {
    const value = Number(mileage || 0);
    return Math.round((value / 10000) * 2);
  }

  function formatDateSafe(value) {
    if (!value) return '—';

    const date = new Date(value);

    if (isNaN(date.getTime())) {
      return '—';
    }

    return date.toLocaleDateString('en-IN', {
      day: '2-digit',
      month: 'short',
      year: 'numeric'
    });
  }

  function getQueryParamSafe(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return String(value ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '&quot;');
  }

  window.logoutBuyer = logoutBuyer;
  window.showContact = showContact;
  window.closeContactModal = closeContactModal;
  window.toggleWishlistDetail = toggleWishlistDetail;
  window.handleCompare = handleCompare;
  window.markInterestedAndBuy = markInterestedAndBuy;
</script>

</body>
</html>
