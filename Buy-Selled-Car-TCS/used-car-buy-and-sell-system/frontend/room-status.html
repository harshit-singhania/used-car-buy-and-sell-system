<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Status Tracking — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page { min-height: 100vh; background: var(--bg); }
    .top-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .top-nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .top-nav-links { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .top-nav-links a,
    .top-nav-links button {
      color: var(--text);
      background: transparent;
      border: none;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 1.5rem 1.25rem 2.5rem; }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.07);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .prompt-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.55rem;
      align-items: end;
    }
    .table-wrap {
      overflow-x: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.07);
    }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    thead { background: #f8fafc; }
    th, td {
      text-align: left;
      padding: 0.7rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.84rem;
      white-space: nowrap;
    }
    th { color: var(--muted); font-weight: 800; }
    .status-chip {
      padding: 0.18rem 0.48rem;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }
    .status-vacant {
      background: #dcfce7;
      color: #166534;
      border-color: #86efac;
    }
    .status-booked {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fca5a5;
    }
    .empty {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
      padding: 1rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="page">
  <div id="nav-placeholder"></div>
  <main class="wrap">
    <section class="panel">
      <h1 style="margin:0;color:var(--primary);font-size:1.45rem;">Admin - Track Room Status</h1>
      <p style="margin:0.45rem 0 0.9rem;color:var(--muted);">Enter a 13-digit Customer ID and submit to view room availability and pricing.</p>
      <div class="prompt-row">
        <div class="field" style="margin:0;">
          <label for="customer-id-input">Customer ID <span class="required">*</span></label>
          <input id="customer-id-input" type="text" inputmode="numeric" maxlength="13" placeholder="Enter 13-digit Customer ID">
          <span class="error-msg" id="customer-id-input-error"></span>
        </div>
        <button class="btn btn-primary" type="button" style="width:auto;margin-top:0;" onclick="viewRoomStatus()">Submit</button>
      </div>
    </section>

    <div id="result"></div>
  </main>
</div>

<script src="js/auth.js"></script>
<script>
  const ROOM_STATUS_KEY = 'ucm_room_status';

  document.addEventListener('DOMContentLoaded', function () {
    const user = getCurrentUser();
    if (!user) {
      window.location.href = 'login-seller.html';
      return;
    }

    if (String(user.role || '').trim().toLowerCase() !== 'admin') {
      clearCurrentUser();
      window.location.href = 'login-seller.html';
      return;
    }

    renderNav();
    seedRoomStatusIfEmpty();
    wireDigitOnlyInput();
  });

  function renderNav() {
    document.getElementById('nav-placeholder').innerHTML = `
      <header class="top-nav">
        <div class="top-nav-inner">
          <div class="brand-logo" style="font-size:1.55rem;">UsedCar<span>Mart</span></div>
          <nav class="top-nav-links">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="history-page.html">History Page</a>
            <a href="room-status.html" style="background:#dbeafe;color:#1d4ed8;">Room Status</a>
            <button type="button" onclick="logoutAdmin()">Logout</button>
          </nav>
        </div>
      </header>
    `;
  }

  function wireDigitOnlyInput() {
    const input = document.getElementById('customer-id-input');
    input.addEventListener('input', function () {
      input.value = String(input.value || '').replace(/\D/g, '').slice(0, 13);
      input.classList.remove('is-error');
      document.getElementById('customer-id-input-error').textContent = '';
    });
  }

  function seedRoomStatusIfEmpty() {
    const existing = getRoomStatusData();
    if (existing.length) return;

    localStorage.setItem(ROOM_STATUS_KEY, JSON.stringify([
      { customerId: '1000000000001', floor: '1', roomType: 'Single', roomCount: 1, pricePerRoom: 1800, availability: 'vacant' },
      { customerId: '1000000000001', floor: '2', roomType: 'Double', roomCount: 2, pricePerRoom: 2200, availability: 'booked' },
      { customerId: '1000000000002', floor: '3', roomType: 'Suite', roomCount: 1, pricePerRoom: 4500, availability: 'booked' },
      { customerId: '1000000000002', floor: '2', roomType: 'Single', roomCount: 3, pricePerRoom: 1800, availability: 'vacant' }
    ]));
  }

  function getRoomStatusData() {
    return JSON.parse(localStorage.getItem(ROOM_STATUS_KEY)) || [];
  }

  function viewRoomStatus() {
    const input = document.getElementById('customer-id-input');
    const error = document.getElementById('customer-id-input-error');
    const customerId = String(input.value || '').trim();
    error.textContent = '';
    input.classList.remove('is-error');

    if (!/^\d{13}$/.test(customerId)) {
      error.textContent = 'Customer ID must be exactly a 13-digit integer.';
      input.classList.add('is-error');
      renderEmpty('Please enter a valid Customer ID and click Submit.');
      return;
    }

    const rows = getRoomStatusData()
      .filter(function (entry) {
        return String(entry.customerId || '') === customerId;
      });

    if (!rows.length) {
      renderEmpty('No room status records found for Customer ID: ' + escapeHtml(customerId));
      return;
    }

    renderTable(customerId, rows);
  }

  function renderTable(customerId, rows) {
    document.getElementById('result').innerHTML = `
      <section class="panel">
        <h2 style="margin:0;color:var(--primary);font-size:1.08rem;">Room Status for Customer ID: ${escapeHtml(customerId)}</h2>
        <p style="margin:0.35rem 0 0;color:var(--muted);">Total room entries: ${rows.length}</p>
      </section>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Customer ID</th>
              <th>Sub (Floor)</th>
              <th>Room Type</th>
              <th>Number of Rooms</th>
              <th>Room Availability</th>
              <th>Price / Room</th>
              <th>Total Price (By Rooms)</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(function (entry) {
              const rooms = Number(entry.roomCount || 0);
              const pricePerRoom = Number(entry.pricePerRoom || 0);
              const totalPrice = rooms * pricePerRoom;
              const availability = String(entry.availability || 'vacant').toLowerCase();
              const statusClass = availability === 'booked' ? 'status-booked' : 'status-vacant';
              const statusLabel = availability === 'booked' ? 'Booked' : 'Vacant';

              return `
                <tr>
                  <td>${escapeHtml(entry.customerId)}</td>
                  <td>${escapeHtml(entry.floor)}</td>
                  <td>${escapeHtml(entry.roomType)}</td>
                  <td>${escapeHtml(String(rooms))}</td>
                  <td><span class="status-chip ${statusClass}">${statusLabel}</span></td>
                  <td>${escapeHtml(formatCurrency(pricePerRoom))}</td>
                  <td>${escapeHtml(formatCurrency(totalPrice))}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderEmpty(message) {
    document.getElementById('result').innerHTML = `
      <div class="empty">${message}</div>
    `;
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat('en-IN', {
      style: 'currency',
      currency: 'INR',
      maximumFractionDigits: 0
    }).format(Number(value || 0));
  }

  function logoutAdmin() {
    clearCurrentUser();
    window.location.href = 'login-seller.html';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  window.logoutAdmin = logoutAdmin;
  window.viewRoomStatus = viewRoomStatus;
</script>
</body>
</html>
