<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Cars — UsedCarMart</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .browse-page {
      min-height: 100vh;
      background: var(--bg);
    }

    .top-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .top-nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .top-nav-links a,
    .top-nav-links button {
      color: var(--text);
      background: transparent;
      border: none;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
    }

    .top-nav-links a:hover,
    .top-nav-links button:hover {
      background: var(--bg);
      color: var(--primary);
    }

    .top-nav-links .active {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .page-wrapper {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 2.5rem;
    }

    .section-header {
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }

    .section-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    .search-hint {
      display: none;
      margin-top: 0.75rem;
      background: #eff6ff;
      color: #1e3a8a;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      font-size: 0.82rem;
      width: fit-content;
      font-weight: 600;
    }

    .market-layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .filter-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 84px;
    }

    .filter-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .filter-panel-head h2 {
      font-size: 1rem;
      color: var(--primary);
      margin: 0;
    }

    .filter-section {
      margin-bottom: 1rem;
    }

    .filter-label {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .split-inputs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .checkbox-list {
      display: grid;
      gap: 0.4rem;
      max-height: 160px;
      overflow: auto;
      padding-right: 0.2rem;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.86rem;
      color: var(--text);
      cursor: pointer;
    }

    .checkbox-item input {
      width: auto;
      margin: 0;
    }

    .main-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .sort-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .result-count {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }

    .sort-select {
      width: auto;
      min-width: 220px;
    }

    .car-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .car-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
    }

    .car-card:hover {
      border-color: rgba(59, 130, 246, 0.28);
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.1);
    }

    .car-img-placeholder {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.32);
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.08em;
    }

    .car-card-body {
      padding: 0.9rem;
    }

    .car-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .car-card-title {
      font-size: 1rem;
      color: var(--text);
      margin: 0;
    }

    .car-subtitle {
      color: var(--muted);
      font-size: 0.83rem;
      margin: 0.25rem 0 0.6rem;
    }

    .car-price {
      color: var(--primary);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .car-card-footer {
      margin-top: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .health-badge {
      display: inline-block;
      padding: 0.3rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .health-good {
      background: #dcfce7;
      color: #166534;
    }

    .health-average {
      background: #fef3c7;
      color: #92400e;
    }

    .health-poor {
      background: #fee2e2;
      color: #b91c1c;
    }

    .view-count {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
    }

    .car-actions {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
    }

    .car-actions .btn {
      flex: 1;
      white-space: nowrap;
    }

    .btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.82rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      border-color: var(--primary-light);
    }

    .btn-secondary {
      background: #fff;
      color: var(--primary);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg);
    }

    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
      border-color: #fecaca;
    }

    .btn-danger:hover {
      background: #fecaca;
    }

    .btn-outline {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
    }

    .btn-outline:hover {
      background: var(--bg);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 2.25rem 1rem;
    }

    .empty-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 1050px) {
      .market-layout {
        grid-template-columns: 1fr;
      }

      .filter-panel {
        position: static;
      }

      .car-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 680px) {
      .top-nav-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .top-nav-left {
        justify-content: space-between;
      }

      .car-grid {
        grid-template-columns: 1fr;
      }

      .car-actions {
        flex-direction: column;
      }

      .sort-select {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
<div class="browse-page">
  <div id="nav-placeholder"></div>

  <div class="page-wrapper">
    <section class="section-header">
      <h1 class="section-title">Browse Cars</h1>
      <p class="section-subtitle">Smart filters for price, make, fuel type, transmission, year and health score.</p>
      <div class="search-hint" id="search-hint"></div>
    </section>

    <section class="market-layout">
      <aside class="filter-panel">
        <div class="filter-panel-head">
          <h2>Filters</h2>
          <button type="button" class="btn btn-secondary" style="width:auto;" onclick="clearFilters()">Clear</button>
        </div>

        <div class="filter-section">
          <label class="filter-label" for="f-price-min">Price Range (₹)</label>
          <div class="split-inputs">
            <input type="number" id="f-price-min" placeholder="Min" min="0">
            <input type="number" id="f-price-max" placeholder="Max" min="0">
          </div>
        </div>

        <div class="filter-section">
          <label class="filter-label">Brand / Make</label>
          <div class="checkbox-list" id="f-make-list"></div>
        </div>

        <div class="filter-section">
          <label class="filter-label">Fuel Type</label>
          <div class="checkbox-list" id="f-fuel-list">
            <label class="checkbox-item"><input type="checkbox" value="Petrol"> Petrol</label>
            <label class="checkbox-item"><input type="checkbox" value="Diesel"> Diesel</label>
            <label class="checkbox-item"><input type="checkbox" value="CNG"> CNG</label>
            <label class="checkbox-item"><input type="checkbox" value="Electric"> Electric</label>
          </div>
        </div>

        <div class="filter-section">
          <label class="filter-label">Transmission</label>
          <div class="checkbox-list" id="f-trans-list">
            <label class="checkbox-item"><input type="checkbox" value="Manual"> Manual</label>
            <label class="checkbox-item"><input type="checkbox" value="Automatic"> Automatic</label>
          </div>
        </div>

        <div class="filter-section">
          <label class="filter-label" for="f-year-from">Year Range</label>
          <div class="split-inputs">
            <select id="f-year-from"><option value="">From</option></select>
            <select id="f-year-to"><option value="">To</option></select>
          </div>
        </div>

        <div class="filter-section" style="margin-bottom:0;">
          <label class="filter-label" for="f-health">Health Score</label>
          <select id="f-health">
            <option value="">All</option>
            <option value="80">Excellent (80+)</option>
            <option value="60">Good (60+)</option>
            <option value="40">Fair (40+)</option>
          </select>
        </div>
      </aside>

      <main class="main-panel">
        <div class="sort-bar">
          <span class="result-count" id="result-count">Loading cars...</span>
          <select class="sort-select" id="sort-select">
            <option value="default">Sort: Newest First</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="health-desc">Highest Health Score</option>
          </select>
        </div>

        <div id="car-grid" class="car-grid"></div>
      </main>
    </section>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/cars.js"></script>
<script>
  let currentUser = null;
  let allAvailable = [];
  let querySearch = '';

  document.addEventListener('DOMContentLoaded', function () {
    currentUser = getCurrentUser();

    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    if (String(currentUser.role || '').trim().toLowerCase() !== 'buyer') {
      clearCurrentUser();
      window.location.href = 'login.html';
      return;
    }

    if (typeof seedCarsIfEmpty === 'function') {
      seedCarsIfEmpty();
    }

    renderNav(currentUser);
    initialisePage();
  });

  function renderNav(user) {
    const nav = document.getElementById('nav-placeholder');

    nav.innerHTML = `
      <header class="top-nav">
        <div class="top-nav-inner">
          <div class="top-nav-left">
            <div class="brand-logo" style="font-size:1.55rem;">
              UsedCar<span>Mart</span>
            </div>
            <span class="badge badge-buyer">BUYER</span>
          </div>

          <nav class="top-nav-links">
            <a href="buyer-home.html">Home</a>
            <a href="car-listings.html" class="active">Browse</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="recently-viewed.html">Recent</a>
            <a href="my-purchases.html">My Purchases</a>
            <a href="support.html">Support</a>
            <button type="button" onclick="logoutBuyer()">Logout</button>
          </nav>
        </div>
      </header>
    `;
  }

  function logoutBuyer() {
    clearCurrentUser();
    window.location.href = 'login.html';
  }

  function initialisePage() {
    querySearch = String(getQueryParam('q') || '').trim().toLowerCase();

    if (typeof getAvailableCars === 'function') {
      allAvailable = getAvailableCars();
    } else {
      allAvailable = getCars().filter(function (car) {
        return String(car.status || 'available').toLowerCase() === 'available';
      });
    }

    populateMakeFilters();
    populateYearFilters();
    applyQueryHint();
    attachFilterListeners();
    applyFilters();
  }

  function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function applyQueryHint() {
    const hint = document.getElementById('search-hint');

    if (!querySearch) {
      hint.style.display = 'none';
      return;
    }

    hint.style.display = 'inline-block';
    hint.textContent = 'Search applied: "' + querySearch + '"';
    document.title = '"' + querySearch + '" — Browse Cars — UsedCarMart';
  }

  function populateMakeFilters() {
    const makeList = document.getElementById('f-make-list');
    const seen = {};
    const makes = [];

    allAvailable.forEach(function (car) {
      const make = String(car.make || '').trim();

      if (!make || seen[make]) {
        return;
      }

      seen[make] = true;
      makes.push(make);
    });

    makes.sort();

    makeList.innerHTML = makes.map(function (make) {
      return '<label class="checkbox-item"><input type="checkbox" value="' + escapeHtml(make) + '"> ' + escapeHtml(make) + '</label>';
    }).join('');
  }

  function populateYearFilters() {
    const fromSelect = document.getElementById('f-year-from');
    const toSelect = document.getElementById('f-year-to');
    const seen = {};
    const years = [];

    allAvailable.forEach(function (car) {
      const year = Number(car.year);

      if (!year || seen[year]) {
        return;
      }

      seen[year] = true;
      years.push(year);
    });

    years.sort(function (a, b) {
      return a - b;
    });

    years.forEach(function (year) {
      const fromOpt = document.createElement('option');
      fromOpt.value = String(year);
      fromOpt.textContent = String(year);
      fromSelect.appendChild(fromOpt);

      const toOpt = document.createElement('option');
      toOpt.value = String(year);
      toOpt.textContent = String(year);
      toSelect.appendChild(toOpt);
    });
  }

  function attachFilterListeners() {
    const ids = [
      'f-price-min',
      'f-price-max',
      'f-year-from',
      'f-year-to',
      'f-health',
      'sort-select'
    ];

    ids.forEach(function (id) {
      const el = document.getElementById(id);

      if (!el) {
        return;
      }

      el.addEventListener('input', applyFilters);
      el.addEventListener('change', applyFilters);
    });

    document.querySelectorAll('#f-make-list input, #f-fuel-list input, #f-trans-list input').forEach(function (el) {
      el.addEventListener('change', applyFilters);
    });
  }

  function applyFilters() {
    const priceMin = parseFloat(document.getElementById('f-price-min').value) || 0;
    const priceMax = parseFloat(document.getElementById('f-price-max').value) || Number.POSITIVE_INFINITY;
    const yearFrom = parseInt(document.getElementById('f-year-from').value, 10) || 0;
    const yearTo = parseInt(document.getElementById('f-year-to').value, 10) || 9999;
    const health = parseInt(document.getElementById('f-health').value, 10) || 0;
    const sortBy = document.getElementById('sort-select').value;
    const selectedMakes = checkedValues('f-make-list');
    const selectedFuels = checkedValues('f-fuel-list');
    const selectedTrans = checkedValues('f-trans-list');

    let filtered = allAvailable.filter(function (car) {
      const label = (String(car.make || '') + ' ' + String(car.model || '')).toLowerCase();
      const healthScore = Number(car.healthScore || calculateHealthScore(car.year, car.mileage));

      if (querySearch && label.indexOf(querySearch) === -1) {
        return false;
      }

      if (Number(car.price || 0) < priceMin || Number(car.price || 0) > priceMax) {
        return false;
      }

      if (selectedMakes.length && selectedMakes.indexOf(String(car.make)) === -1) {
        return false;
      }

      if (selectedFuels.length && selectedFuels.indexOf(String(car.fuelType)) === -1) {
        return false;
      }

      if (selectedTrans.length && selectedTrans.indexOf(String(car.transmission)) === -1) {
        return false;
      }

      if (Number(car.year || 0) < yearFrom || Number(car.year || 0) > yearTo) {
        return false;
      }

      if (health && healthScore < health) {
        return false;
      }

      return true;
    });

    filtered = sortCars(filtered, sortBy);
    renderCars(filtered);
  }

  function sortCars(cars, sortBy) {
    const sorted = cars.slice();

    if (sortBy === 'price-asc') {
      sorted.sort(function (a, b) {
        return Number(a.price || 0) - Number(b.price || 0);
      });
      return sorted;
    }

    if (sortBy === 'price-desc') {
      sorted.sort(function (a, b) {
        return Number(b.price || 0) - Number(a.price || 0);
      });
      return sorted;
    }

    if (sortBy === 'health-desc') {
      sorted.sort(function (a, b) {
        const aScore = Number(a.healthScore || calculateHealthScore(a.year, a.mileage));
        const bScore = Number(b.healthScore || calculateHealthScore(b.year, b.mileage));
        return bScore - aScore;
      });
      return sorted;
    }

    sorted.sort(function (a, b) {
      return new Date(b.listingDate || 0) - new Date(a.listingDate || 0);
    });

    return sorted;
  }

  function renderCars(cars) {
    const userId = currentUser.id || currentUser.userId;
    const grid = document.getElementById('car-grid');
    const count = document.getElementById('result-count');

    count.textContent = 'Showing ' + cars.length + ' of ' + allAvailable.length + ' cars';

    if (!cars.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>No cars found</h3>
          <p>Try adjusting your filters or clear all filters.</p>
          <button type="button" class="btn btn-secondary" style="width:auto;" onclick="clearFilters()">Clear Filters</button>
        </div>
      `;
      return;
    }

    grid.innerHTML = cars.map(function (car) {
      return buildCarCard(car, userId);
    }).join('');
  }

  function buildCarCard(car, userId) {
    const score = Number(car.healthScore || calculateHealthScore(car.year, car.mileage));
    const band = getHealthBand(score);
    const bg = makeColor(car.make);
    const wishlistKey = 'ucm_wishlist_' + String(userId || 'guest');
    const wishlist = JSON.parse(localStorage.getItem(wishlistKey)) || [];
    const isWished = wishlist.indexOf(String(car.id)) !== -1;

    return `
      <article class="car-card">
        <div class="car-img-placeholder" style="background:${bg}">
          ${escapeHtml(String(car.make || '?').charAt(0))}
        </div>

        <div class="car-card-body">
          <div class="car-card-header">
            <h3 class="car-card-title">${escapeHtml(car.make)} ${escapeHtml(car.model)}</h3>
          </div>

          <p class="car-subtitle">${escapeHtml(car.year)} &bull; ${escapeHtml(car.fuelType)} &bull; ${escapeHtml(car.transmission)}</p>
          <div class="car-price">${formatPrice(car.price)}</div>

          <div class="car-card-footer">
            <span class="health-badge ${band.cls}">${escapeHtml(score)} ${escapeHtml(band.label)}</span>
            <span class="view-count">👁 ${Number(car.viewCount || 0)} views</span>
          </div>


          <div class="car-actions">
            <a class="btn btn-secondary" href="car-details.html?id=${encodeURIComponent(car.id)}">View Details</a>
            <button
              type="button"
              class="btn ${isWished ? 'btn-danger' : 'btn-outline'}"
              onclick="toggleWishlistCard('${escapeAttr(String(car.id))}', '${escapeAttr(String(userId))}', this)"
            >${isWished ? '♥ Saved' : '♡ Save'}</button>
          </div>
        </div>
      </article>
    `;
  }

  function toggleWishlistCard(carId, userId, btn) {
    const key = 'ucm_wishlist_' + String(userId || 'guest');
    const wishlist = JSON.parse(localStorage.getItem(key)) || [];
    const exists = wishlist.indexOf(carId) !== -1;
    let updated = [];

    if (exists) {
      updated = wishlist.filter(function (id) {
        return String(id) !== String(carId);
      });
    } else {
      updated = wishlist.concat([carId]);
    }

    localStorage.setItem(key, JSON.stringify(updated));

    if (!exists) {
      const dateKey = 'ucm_wishlist_dates_' + String(userId || 'guest');
      const dates = JSON.parse(localStorage.getItem(dateKey)) || {};
      dates[carId] = new Date().toISOString();
      localStorage.setItem(dateKey, JSON.stringify(dates));
    }

    btn.textContent = exists ? '♡ Save' : '♥ Saved';
    btn.className = 'btn ' + (exists ? 'btn-outline' : 'btn-danger');
  }

  function checkedValues(containerId) {
    return Array.from(document.querySelectorAll('#' + containerId + ' input:checked')).map(function (el) {
      return el.value;
    });
  }

  function clearFilters() {
    document.getElementById('f-price-min').value = '';
    document.getElementById('f-price-max').value = '';
    document.getElementById('f-year-from').value = '';
    document.getElementById('f-year-to').value = '';
    document.getElementById('f-health').value = '';
    document.getElementById('sort-select').value = 'default';

    document.querySelectorAll('#f-make-list input, #f-fuel-list input, #f-trans-list input').forEach(function (el) {
      el.checked = false;
    });

    applyFilters();
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return String(value || '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
